<style>
:root{
  --bg:#0f1714;--bg2:#0c1310;--card:#16201b;--card2:#1b2621;--line:#243029;--line2:#2d3a32;
  --ink:#eaf2ec;--mut:#9fb8ac;--hint:#6f857c;
  --ok:#5fd39b;--ok-bg:#15251c;--ok-bd:#1f3d2c;
  --near:#f3c75a;--near-bg:#2a2414;--near-bd:#4a3f1c;
  --below:#ef9a5d;--below-bg:#2c1f16;--below-bd:#4e3420;
  --bad:#f0726b;--bad-bg:#2c1717;--bad-bd:#4e2424;
  --pend:#8aa39a;--pend-bg:#1c2823;
  --fc:#5fbf8e;--fb:#15251c;
  --r:13px;--nh:64px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;background:var(--bg)}
body{font-family:'Sarabun',-apple-system,sans-serif;font-size:16px;color:var(--ink);-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh;max-width:520px;margin:0 auto;background:var(--bg)}
.ab{flex:none;height:58px;display:flex;align-items:center;padding:0 14px;gap:10px;z-index:20;background:var(--card);border-bottom:1px solid var(--line)}
.ab .logo{width:36px;height:36px;border-radius:8px;background:#fff;padding:2px;object-fit:contain;flex:none}
.ab h1{font-size:15px;font-weight:700;color:#fff;line-height:1.2}
.ab .sub{font-size:10.5px;color:var(--mut)}
.ibtn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:rgba(255,255,255,.08);color:#dfe;border:none;font-size:18px;cursor:pointer;flex:none;font-family:inherit;position:relative}
.bdg{position:absolute;top:-3px;right:-4px;background:var(--bad);color:#1a0f0f;font-size:9px;font-weight:700;padding:0 4px;border-radius:99px;min-width:15px;text-align:center;line-height:15px}
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 80px}
.bnav{flex:none;height:var(--nh);background:var(--bg2);border-top:1px solid var(--line);display:flex;z-index:20}
.bnav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:var(--hint);cursor:pointer;gap:2px;border:none;background:none;font-family:inherit;position:relative;padding-bottom:4px}
.bnav a .ic{font-size:20px;line-height:1}
.bnav a.on{color:var(--fc);font-weight:700}
.bnav a .nb{position:absolute;top:7px;right:calc(50% - 20px);background:var(--bad);color:#1a0f0f;font-size:8px;font-weight:700;padding:0 4px;border-radius:99px;min-width:14px;text-align:center;line-height:14px}
/* footer credit */
.cred{text-align:center;padding:10px 14px 4px;font-size:11px;color:var(--hint);border-top:1px solid var(--line);margin-top:6px}
.cred strong{color:var(--mut);font-weight:600}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px;margin-bottom:11px}
.chip{font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;white-space:nowrap}
.c-ok{background:var(--ok-bg);color:var(--ok)}.c-near{background:var(--near-bg);color:var(--near)}
.c-below{background:var(--below-bg);color:var(--below)}.c-bad{background:var(--bad-bg);color:var(--bad)}
.c-pend{background:var(--pend-bg);color:var(--pend)}
.mini{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:7px}
.fdot{width:9px;height:9px;border-radius:50%;display:inline-block;flex:none;vertical-align:middle;margin-right:5px}
label.fld{display:block;font-size:13px;color:var(--mut);margin:0 0 5px 1px;font-weight:600}
select,input[type=text],input[type=month],input[type=search]{font-family:inherit;font-size:15px;color:var(--ink);border:1px solid var(--line2);background:var(--card2);border-radius:10px;padding:9px 12px;width:100%}
select:focus,input:focus{outline:none;border-color:var(--fc);box-shadow:0 0 0 3px rgba(95,191,142,.15)}
::placeholder{color:var(--hint)}
.btn{font-family:inherit;font-size:15px;font-weight:700;border:none;border-radius:11px;padding:12px 16px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%}
.btn:active{opacity:.82}
.btn.prim{background:var(--fc);color:#08130d}
.btn.sec{background:var(--card2);color:var(--ink);border:1px solid var(--line2)}
.btn.sm{font-size:13px;font-weight:600;padding:8px 13px;width:auto;border-radius:9px}
.btn.cta{font-size:17px;padding:16px;border-radius:13px}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.sec-h{font-size:12.5px;font-weight:700;color:var(--mut);padding:12px 2px 7px;letter-spacing:.3px}
.prog{height:9px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:6px}
.prog i{display:block;height:100%;background:var(--fc);border-radius:99px;transition:width .3s}
.stepper{display:flex;align-items:center;gap:8px}
.stepper button{width:38px;height:38px;border-radius:10px;border:1px solid var(--line2);background:var(--card2);font-size:21px;cursor:pointer;color:var(--ink);flex:none;font-family:inherit}
.qty{min-width:30px;text-align:center;font-size:20px;font-weight:700}
.lot{display:flex;align-items:center;gap:7px;margin-top:9px}
.lot input[type=month]{flex:1;padding:8px 10px;font-size:14px}
.lot .rm{width:34px;height:34px;border-radius:8px;border:1px solid var(--line2);background:var(--card2);color:var(--bad);font-size:15px;cursor:pointer;flex:none;font-family:inherit}
.addlot{font-size:13px;font-weight:700;color:var(--fc);background:var(--fb);border:1px solid var(--ok-bd);border-radius:9px;padding:8px 13px;cursor:pointer;font-family:inherit}
.nostock{font-size:13px;font-weight:600;color:var(--mut);background:var(--card2);border:1px solid var(--line2);border-radius:9px;padding:8px 13px;cursor:pointer;font-family:inherit}
.s4{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.s2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi{border-radius:12px;padding:12px 13px;border:1px solid}
.kpi .top{display:flex;align-items:center;gap:7px}
.kpi .n{font-size:25px;font-weight:700;line-height:1}
.kpi .l{font-size:11.5px;color:var(--mut);margin-top:3px}
.k-ok{background:var(--ok-bg);border-color:var(--ok-bd)}
.k-near{background:var(--near-bg);border-color:var(--near-bd)}
.k-below{background:var(--below-bg);border-color:var(--below-bd)}
.k-bad{background:var(--bad-bg);border-color:var(--bad-bd)}
.sbox{border-radius:11px;padding:10px 8px;text-align:center}
.sbox .n{font-size:21px;font-weight:700;line-height:1.1}
.sbox .l{font-size:11px;margin-top:3px;line-height:1.3}
.flist{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-left:5px solid var(--fc);border-radius:10px;padding:10px 13px;margin-bottom:8px;cursor:pointer}
.flist:active{background:var(--card2)}
.acti{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.acti:last-child{border-bottom:none;padding-bottom:2px}
.irow{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.fmenu{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mb{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:0;cursor:pointer;text-align:left;font-family:inherit;overflow:hidden;display:flex;flex-direction:column}
.mb:active{background:var(--card2)}
.mb .mbar{height:5px;width:100%}
.mb .mbody{padding:13px 12px 14px}
.mb .mic{font-size:23px;margin-bottom:7px;display:block;color:var(--fc)}
.mb .mtt{font-size:14px;font-weight:700;color:var(--ink);line-height:1.3}
.mb .msb{font-size:11.5px;color:var(--mut);margin-top:3px}
.mb.wide{grid-column:span 2;flex-direction:row;align-items:stretch}
.mb.wide .mbar{width:5px;height:auto}
.mb.wide .mbody{display:flex;align-items:center;gap:12px;padding:13px 14px;flex:1}
.mb.wide .mic{font-size:25px;margin:0;flex:none}
.seg{display:flex;gap:6px;margin-bottom:12px}
.seg button{flex:1;padding:9px 4px;border-radius:10px;border:1px solid var(--line2);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--card2);color:var(--mut)}
.seg .on{background:var(--fc);color:#08130d;border-color:var(--fc)}
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mnav button{background:none;border:none;font-size:22px;cursor:pointer;color:var(--fc);padding:4px 10px;font-family:inherit}
.mnav .label{font-size:15px;font-weight:700}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.blbl{font-size:11.5px;color:var(--mut);width:62px;text-align:right;flex:none}
.btrk{flex:1;height:18px;background:var(--bg2);border-radius:6px;overflow:hidden;position:relative}
.rk{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
.rk:last-child{border-bottom:none}
.rk .pos{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex:none}
.sw{display:flex;align-items:center;gap:10px;position:relative;margin-bottom:12px}
.sw .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--hint);font-size:16px;pointer-events:none}
.sw input{padding-left:36px}
.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:#05201a;border:1px solid var(--ok-bd);color:#dfffef;padding:11px 18px;border-radius:11px;font-size:13.5px;z-index:99;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.empty{text-align:center;padding:40px 16px;color:var(--hint);font-size:14px}
table.rep{width:100%;border-collapse:collapse;font-size:12.5px}
table.rep th,table.rep td{border:1px solid var(--line2);padding:7px 8px;text-align:center;color:var(--ink)}
table.rep th{font-weight:700;font-size:12px;color:var(--mut)}
table.rep td.l{text-align:left}
.canvas-wrap{position:relative;height:175px}
@media print{body,.app{background:#fff!important}.bnav,.ibtn,.noprint{display:none!important}.scr{padding:0;overflow:visible}#prt{display:block!important;color:#111}.cred{display:none}}
#prt{display:none}

.tgl{width:42px;height:24px;border-radius:99px;border:none;cursor:pointer;position:relative;flex:none;transition:background .2s}
.tgl.on{background:var(--fc)}.tgl.off{background:var(--line2)}
.tgl::after{content:"";position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .15s}
.tgl.on::after{left:21px}.tgl.off::after{left:3px}
.btn.danger{background:var(--bad-bg);color:var(--bad);border:1px solid var(--bad-bd)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;display:flex;align-items:flex-end}
.modal{background:var(--card);border-radius:18px 18px 0 0;padding:20px 18px 34px;width:100%;max-width:520px;margin:0 auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:14px;color:var(--ink)}
.footer-dev{text-align:center;padding:14px 0 4px;font-size:10.5px;color:var(--hint);border-top:1px solid var(--line);margin-top:8px}
.sw-wrap{position:relative;margin-bottom:12px}
.sw-wrap .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--hint);font-size:16px;pointer-events:none}
.sw-wrap input{padding-left:36px}
</style>
</head>

/* ── HELPERS ── */
function F(id){return FARMS.find(x=>x.id===id)||FARMS[0]}
function FC(fid){return FARM_CFG[fid]||(FARM_CFG[fid]={items:STD_ITEMS.map(x=>({...x})),resp:'',inspector:INSPECTORS[0]}),FARM_CFG[fid]}
function fItems(fid){return FC(fid).items.filter(x=>!x.hidden)}
function CN(id){const c=CATS.find(x=>x.id===id);return c?c.name:''}
function beD(iso){const d=new Date(iso);const M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];return d.getDate()+' '+M[d.getMonth()]+' '+(d.getFullYear()+543)}
function thM(ym){if(!ym)return'';const[y,m]=ym.split('-');const M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];return M[parseInt(m)-1]+' '+(parseInt(y)+543)}
function xL(ym){if(!ym)return'—';const[y,m]=ym.split('-');return m+'/'+(parseInt(y)+543)}
function nowYM(){const n=new Date();return n.getFullYear()*12+n.getMonth()}
function daysTo(ym){if(!ym)return null;const[y,m]=ym.split('-').map(Number);const t=new Date(y,m,0);return Math.round((t-Date.now())/86400000)}
function daysSince(iso){return Math.floor((Date.now()-new Date(iso))/86400000)}
function lt(line){return(line.lots||[]).reduce((s,l)=>s+(parseInt(l.qty)||0),0)}
function nx(line){return(line.lots||[]).filter(l=>l.exp).map(l=>l.exp).sort()[0]||''}
function ls(line,item){
  if(!line||!line.touched)return'pending';
  const t=lt(line);if(t===0)return'out';
  let ex=false,nr=false;const c=nowYM();
  (line.lots||[]).forEach(l=>{if(l.exp){const[y,m]=l.exp.split('-').map(Number);const v=y*12+(m-1);if(v<c)ex=true;else if(v-c<=NM)nr=true;}});
  if(ex)return'expired';if(t<(item.min||0))return'below';if(nr)return'near';return'ok';
}
function summ(insp,fid){
  const its=fItems(fid);
  const c={ok:0,near:0,below:0,expired:0,out:0,pending:0};
  its.forEach(it=>{const l=(insp.lines||{})[it.id]||{lots:[],touched:false};c[ls(l,it)]++;});
  return c;
}
function latF(fid){return INSPS.filter(i=>i.farmId===fid).sort((a,b)=>b.ts-a.ts)[0]||null}
function latFM(fid,ym){return INSPS.filter(i=>i.farmId===fid&&i.date.startsWith(ym)).sort((a,b)=>b.ts-a.ts)[0]||null}
function allKPI(){const c={ok:0,near:0,below:0,expired:0,out:0,pending:0};FARMS.forEach(f=>{const li=latF(f.id);if(li){const s=summ(li,f.id);for(const k in c)c[k]+=s[k];}});return c}
function buildAlerts(){
  const A=[];
  FARMS.forEach(f=>{const li=latF(f.id);
    if(!li){A.push({sev:2,fid:f.id,farm:f.name,fc:f.c,title:'ยังไม่เคยตรวจ',desc:'ศูนย์นี้ยังไม่มีข้อมูล',sub:'ยังไม่ตรวจ',col:'var(--near)',ic:'🕒'});return;}
    const ds=daysSince(li.date);
    if(ds>=STALE)A.push({sev:2,fid:f.id,farm:f.name,fc:f.c,title:f.sh,desc:'ไม่ได้ตรวจมา '+ds+' วัน',sub:'ค้างตรวจ',col:'var(--near)',ic:'🕒'});
    fItems(f.id).forEach(it=>{const line=(li.lines||{})[it.id]||{lots:[],touched:false};const stk=ls(line,it);
      if(stk==='expired')A.push({sev:0,fid:f.id,farm:f.name,fc:f.c,title:it.name,desc:'หมดอายุแล้ว ('+xL(nx(line))+')',sub:'หมดอายุ',col:'var(--bad)',ic:'⛔'});
      else if(stk==='out')A.push({sev:0,fid:f.id,farm:f.name,fc:f.c,title:it.name,desc:'ไม่มีของในคลัง',sub:'หมด',col:'var(--bad)',ic:'⛔'});
      else if(stk==='near'){const d=daysTo(nx(line));A.push({sev:1,fid:f.id,farm:f.name,fc:f.c,title:it.name,desc:'ใกล้หมดอายุ'+(d!=null?' ใน '+d+' วัน':''),sub:'ใกล้หมดอายุ',col:'var(--near)',ic:'⏰'});}
      else if(stk==='below')A.push({sev:1,fid:f.id,farm:f.name,fc:f.c,title:it.name,desc:'ต่ำกว่าเกณฑ์ (เหลือ '+lt(line)+' '+it.unit+')',sub:'ต่ำกว่าเกณฑ์',col:'var(--below)',ic:'🔻'});
    });
  });
  A.sort((a,b)=>a.sev-b.sev);return A;
}
function setTh(f){document.documentElement.style.setProperty('--fc',f.c);document.documentElement.style.setProperty('--fb',f.bg)}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400)}

function csvX(li,its){const f=F(S.fid);let rows=[['ศูนย์','วันที่ตรวจ','ผู้ตรวจ','หมวด','รายการ','หน่วย','ขั้นต่ำ','คงเหลือ','วันหมดอายุ','สถานะ']];
  its.forEach(it=>{const line=(li.lines||{})[it.id]||{};rows.push([f.name,beD(li.date),li.inspector,CN(it.cat),it.name,it.unit,it.min,line.touched?lt(line):'',it.exp&&nx(line)?xL(nx(line)):'—',SM[ls(line,it)].l]);});
  const csv=rows.map(r=>r.map(c=>{c=String(c);return/[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c}).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;
  const d=new Date();a.download='MediTrack_'+f.sh+'_'+(d.getFullYear()+543)+String(d.getMonth()+1).padStart(2,'0')+'.csv';
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);toast('ดาวน์โหลด CSV แล้ว')}

/* ── HISTORY ── */
function rHist(){
  const list=INSPS.filter(i=>i.farmId===S.fid).sort((a,b)=>b.ts-a.ts);
  if(!list.length){document.getElementById('scr').innerHTML='<div class="empty">ยังไม่มีประวัติ</div>'+cred();return}
  document.getElementById('scr').innerHTML=list.map(insp=>{const s=summ(insp,S.fid);const prob=s.expired+s.out+s.below+s.near;return`<div class="irow" style="cursor:pointer" onclick="S.did='${insp.id}';rHD()"><div><div style="font-size:14.5px;font-weight:700">${beD(insp.date)}</div><div style="font-size:12px;color:var(--hint);margin-top:2px">ผู้ตรวจ: ${insp.inspector}</div></div><span class="chip ${prob?'c-bad':'c-ok'}">${prob?prob+' รายการ':'ครบถ้วน'}</span></div>`;}).join('')+cred();
}
function rHD(){
  const insp=INSPS.find(i=>i.id===S.did);if(!insp){rHist();return}
  const s=summ(insp,S.fid);const f=F(S.fid);const its=fItems(S.fid);
  let h=`<button class="btn sm sec" style="margin-bottom:12px" onclick="rHist()">‹ กลับรายการ</button>
    <div class="card" style="border-left:5px solid ${f.c}"><div style="font-weight:700;font-size:15px">${beD(insp.date)}</div><div style="font-size:13px;color:var(--mut);margin-top:3px">ผู้ตรวจ: ${insp.inspector}</div>
    <div class="s4" style="margin-top:12px">
      <div class="kpi k-ok" style="padding:9px 10px"><div class="top" style="color:var(--ok)"><span class="n" style="font-size:19px">${s.ok}</span></div><div class="l">ปกติ</div></div>
      <div class="kpi k-near" style="padding:9px 10px"><div class="top" style="color:var(--near)"><span class="n" style="font-size:19px">${s.near}</span></div><div class="l">ใกล้หมด</div></div>
      <div class="kpi k-below" style="padding:9px 10px"><div class="top" style="color:var(--below)"><span class="n" style="font-size:19px">${s.below}</span></div><div class="l">ต่ำกว่า</div></div>
      <div class="kpi k-bad" style="padding:9px 10px"><div class="top" style="color:var(--bad)"><span class="n" style="font-size:19px">${s.expired+s.out}</span></div><div class="l">หมด/หมดอายุ</div></div></div></div>`;
  CATS.forEach(cat=>{h+=`<div class="sec-h">${cat.name}</div>`;its.filter(i=>i.cat===cat.id).forEach(it=>{const line=(insp.lines||{})[it.id]||{};const sm=SM[ls(line,it)];h+=`<div class="irow" style="cursor:default"><div><div style="font-size:14px;font-weight:700">${it.name}</div><div style="font-size:12px;color:var(--hint);margin-top:2px">${line.touched?lt(line)+' '+it.unit:'—'}${it.exp&&nx(line)?' · หมด '+xL(nx(line)):''}</div></div><span class="chip ${sm.c}">${sm.l}</span></div>`;});});
  document.getElementById('scr').innerHTML=h+cred();
}

/* ── ALERTS ── */
function rAlerts(){
  rsTh();const all=buildAlerts();
  let h=`<div class="seg"><button class="on" id="al-all" onclick="alF('all')">ทั้งหมด (${all.length})</button><button id="al-act" onclick="alF('act')">ต้องดำเนินการ (${all.filter(a=>a.sev<=1).length})</button></div><div id="alr"></div>${cred()}`;
  document.getElementById('scr').innerHTML=h;S._alMode='all';
  window.alF=m=>{S._alMode=m;document.getElementById('al-all').classList.toggle('on',m==='all');document.getElementById('al-act').classList.toggle('on',m==='act');document.getElementById('alr').innerHTML=alrH(all);};
  document.getElementById('alr').innerHTML=alrH(all);
}
function alrH(all){const list=S._alMode==='act'?all.filter(a=>a.sev<=1):all;if(!list.length)return`<div class="empty">ไม่มีรายการแจ้งเตือน ✓</div>`;
  return list.map(a=>`<div class="irow" style="cursor:pointer" onclick="go('farm',{fid:${a.fid}})"><div style="display:flex;gap:10px;min-width:0"><span style="font-size:18px">${a.ic}</span><div style="min-width:0"><div style="font-size:14px;font-weight:700">${a.title}</div><div style="font-size:12px;color:${a.col};margin-top:1px">${a.desc}</div><div style="font-size:11px;color:var(--hint);margin-top:2px"><span class="fdot" style="background:${a.fc};width:8px;height:8px"></span>${a.farm}</div></div></div><span class="chip" style="background:${a.col};color:#0c1410">${a.sub}</span></div>`).join('')}

/* ── FARM SETTINGS (เพิ่ม/ซ่อน/ลบรายการ + ผู้รับผิดชอบ) ── */
function rFSett(){
  const f=F(S.fid);const cfg=FC(S.fid);
  let h=`<div class="card" style="border-left:5px solid ${f.c}">
    <div style="font-size:14px;font-weight:700;margin-bottom:8px">ผู้รับผิดชอบประจำศูนย์</div>
    <select id="respSel" style="margin-bottom:10px">${INSPECTORS.map(n=>`<option${n===cfg.resp?' selected':''}>${n}</option>`).join('')}</select>
    <button class="btn prim" onclick="svResp()">บันทึกผู้รับผิดชอบ</button></div>
  <div class="sec-h">จัดการรายการยาและเวชภัณฑ์</div>
  <div class="card" style="padding:12px 14px;margin-bottom:11px">
    <div style="font-size:13px;font-weight:700;margin-bottom:10px">เพิ่มรายการใหม่</div>
    <label class="fld">ชื่อรายการ</label>
    <input type="text" id="nname" placeholder="เช่น Calcium Hypochlorite" style="margin-bottom:8px">
    <div class="s2" style="gap:8px;margin-bottom:8px">
      <div><label class="fld">หมวด</label>
        <select id="ncat"><option value="equip">อุปกรณ์</option><option value="consum">วัสดุสิ้นเปลือง</option><option value="external" selected>ยาภายนอก</option><option value="oral">ยารับประทาน</option></select></div>
      <div><label class="fld">หน่วย</label><input type="text" id="nunit" placeholder="ขวด / หลอด / แผง"></div>
    </div>
    <div class="s2" style="gap:8px;margin-bottom:10px">
      <div><label class="fld">ขั้นต่ำ</label><input type="text" id="nmin" placeholder="1" style="width:100%"></div>
      <div style="display:flex;flex-direction:column;justify-content:flex-end"><label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--mut);cursor:pointer"><input type="checkbox" id="nexp" checked> มีวันหมดอายุ</label></div>
    </div>
    <button class="btn prim" onclick="addItem()">＋ เพิ่มรายการนี้</button></div>`;

  h+=`<div class="sec-h">รายการทั้งหมด (${cfg.items.length} รายการ)</div>`;
  CATS.forEach(cat=>{const its=cfg.items.filter(i=>i.cat===cat.id);if(!its.length)return;
    h+=`<div class="sec-h" style="padding-top:4px;font-size:11.5px;color:var(--fc)">${cat.name}</div>`;
    its.forEach(it=>{const isStd=STD_ITEMS.some(s=>s.id===it.id);
      h+=`<div class="card" style="padding:10px 13px;margin-bottom:7px;${it.hidden?'opacity:.45':''}">
        <div class="row" style="margin-bottom:6px">
          <div style="min-width:0"><div style="font-size:14px;font-weight:700">${it.name}${isStd?'':' <span style="font-size:10px;color:var(--fc);background:var(--ok-bg);padding:1px 6px;border-radius:5px">เพิ่มเอง</span>'}</div>
          <div style="font-size:12px;color:var(--hint)">${it.unit} · ขั้นต่ำ <span id="mv${it.id}">${it.min}</span></div></div>
          <div style="display:flex;gap:6px">
            <button class="btn sm sec" style="padding:6px 10px" onclick="toggleHide('${it.id}')">${it.hidden?'แสดง':'ซ่อน'}</button>
            ${!isStd?`<button class="btn sm" style="padding:6px 10px;background:var(--bad-bg);color:var(--bad);border:1px solid var(--bad-bd)" onclick="delItem('${it.id}')">ลบ</button>`:''}
          </div></div>
        <div class="row" style="margin-top:2px">
          <span style="font-size:12px;color:var(--mut)">ขั้นต่ำ</span>
          <div class="stepper"><button onclick="chMin('${it.id}',-1)">−</button><span class="qty" id="mn${it.id}" style="font-size:16px">${it.min}</span><button onclick="chMin('${it.id}',1)">＋</button></div>
        </div></div>`;});});
  h+=`<button class="btn sec" style="margin-top:6px" onclick="rsMin()">คืนค่าขั้นต่ำเป็นค่ามาตรฐาน</button>${cred()}`;
  document.getElementById('scr').innerHTML=h;
  window.svResp=async()=>{cfg.resp=document.getElementById('respSel').value;await saveCfg();toast('บันทึกผู้รับผิดชอบแล้ว')};
  window.addItem=async()=>{
    const name=document.getElementById('nname').value.trim();
    if(!name){toast('กรุณาใส่ชื่อรายการ');return}
    const it={id:'c'+Date.now(),name,cat:document.getElementById('ncat').value,unit:document.getElementById('nunit').value.trim()||'ชิ้น',min:parseInt(document.getElementById('nmin').value)||1,exp:document.getElementById('nexp').checked,hidden:false};
    cfg.items.push(it);await saveCfg();toast('เพิ่ม "'+name+'" แล้ว');rFSett();};
  window.toggleHide=async id=>{const it=cfg.items.find(x=>x.id===id);if(it){it.hidden=!it.hidden;await saveCfg();rFSett();}};
  window.delItem=async id=>{if(!confirm('ลบรายการนี้ออกจากศูนย์นี้?'))return;cfg.items=cfg.items.filter(x=>x.id!==id);await saveCfg();toast('ลบแล้ว');rFSett();};
}
async function chMin(id,d){const it=FC(S.fid).items.find(x=>x.id===id);if(!it)return;it.min=Math.max(0,(it.min||0)+d);const el=document.getElementById('mn'+id);if(el)el.textContent=it.min;await saveCfg()}
async function rsMin(){if(!confirm('คืนค่าขั้นต่ำทั้งหมดเป็นค่ามาตรฐาน?'))return;const cfg=FC(S.fid);cfg.items.forEach(it=>{const s=STD_ITEMS.find(x=>x.id===it.id);if(s)it.min=s.min});await saveCfg();rFSett();toast('คืนค่าแล้ว')}

/* ── GLOBAL SETTINGS ── */
function rSett(){
  rsTh();
  document.getElementById('scr').innerHTML=`<div class="card">
    <div style="font-size:15px;font-weight:700;margin-bottom:10px">เชื่อมต่อ Google Sheet</div>
    <div style="font-size:13px;color:var(--mut);margin-bottom:10px">Sheet ID: <code style="background:var(--card2);padding:2px 6px;border-radius:5px;font-size:11px">${SID}</code></div>
    <label class="fld">ลิงก์ Web App</label>
    <input type="text" id="gu" value="${gsUrl}" placeholder="https://script.google.com/macros/s/.../exec" style="margin-bottom:10px">
    <div class="s2" style="gap:8px"><button class="btn prim sm" style="flex:1" onclick="svGs()">บันทึก</button><button class="btn sec sm" style="flex:1" onclick="tstGs()">ทดสอบ</button></div>
    <div style="font-size:12px;color:${gsUrl?'var(--ok)':'var(--hint)'};margin-top:8px">${gsUrl?'● เชื่อมต่อแล้ว':'○ ยังไม่ได้ตั้งค่า'}</div></div>
  <div class="card">
    <div style="font-size:15px;font-weight:700;margin-bottom:6px">🔔 Telegram (เร็วๆ นี้)</div>
    <div style="font-size:13px;color:var(--mut)">ระบบแจ้งเตือนอัตโนมัติผ่าน Telegram กำลังพัฒนา</div></div>
  <div class="card">
    <div style="font-size:15px;font-weight:700;margin-bottom:5px">เกี่ยวกับ MediTrack</div>
    <div style="font-size:13px;color:var(--mut);line-height:1.9">ระบบตรวจนับสต็อกยาและเวชภัณฑ์ MSBRC-2<br>5 ศูนย์วิจัย · ${INSPS.length} บันทึก · Dark Mode</div></div>
  ${cred()}`;
}
async function svGs(){gsUrl=(document.getElementById('gu').value||'').trim();await ss('gsheet_url',gsUrl);toast('บันทึกลิงก์แล้ว')}
async function tstGs(){const u=(document.getElementById('gu').value||'').trim();if(!u){toast('ใส่ลิงก์ก่อน');return}
  const p={sheetId:SID,farm:'(ทดสอบ)',date:beD(new Date().toISOString()),inspector:'ระบบ',ts:new Date().toISOString(),rows:[{category:'ทดสอบ',item:'MediTrack Connection Test',unit:'-',min:0,qty:1,exp:'-',status:'ทดสอบ'}]};
  try{await fetch(u,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(p)});toast('ส่งทดสอบแล้ว — เปิดชีตตรวจสอบ')}catch(e){toast('ส่งไม่สำเร็จ')}}
async function pSh(rec){if(!gsUrl)return false;const its=fItems(rec.farmId);
  const p={sheetId:SID,farm:F(rec.farmId).name,date:beD(rec.date),inspector:rec.inspector,ts:new Date(rec.ts).toISOString(),rows:its.map(it=>{const line=(rec.lines||{})[it.id]||{};const stk=ls(line,it);return{category:CN(it.cat),item:it.name,unit:it.unit,min:it.min,qty:line.touched?lt(line):'',exp:it.exp&&nx(line)?xL(nx(line)):'—',status:SM[stk].l};})};
  try{await fetch(gsUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(p)});return true}catch(e){return false}}

boot();

</script>
