<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ตรวจนับสต็อกยาและเวชภัณฑ์ – CPF</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0f1714;--bg2:#0c1310;--card:#16201b;--card2:#1b2621;--line:#243029;--line2:#2d3a32;
  --ink:#eaf2ec;--mut:#9fb8ac;--hint:#6f857c;
  --ok:#5fd39b;--ok-bg:#15251c;--ok-bd:#1f3d2c;
  --near:#f3c75a;--near-bg:#2a2414;--near-bd:#4a3f1c;
  --below:#ef9a5d;--below-bg:#2c1f16;--below-bd:#4e3420;
  --bad:#f0726b;--bad-bg:#2c1717;--bad-bd:#4e2424;
  --pend:#8aa39a;--pend-bg:#1c2823;
  --fc:#5fbf8e;--fb:#15251c;
  --r:13px;--nh:64px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;background:var(--bg)}
body{font-family:'Sarabun',-apple-system,sans-serif;font-size:16px;color:var(--ink);-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh;max-width:520px;margin:0 auto;background:var(--bg)}
.ab{flex:none;height:58px;display:flex;align-items:center;padding:0 14px;gap:10px;z-index:20;background:var(--card);border-bottom:1px solid var(--line)}
.ab .logo{width:38px;height:38px;border-radius:9px;background:#fff;padding:2px;object-fit:contain;flex:none}
.ab h1{font-size:15.5px;font-weight:700;color:#fff;line-height:1.2}
.ab .sub{font-size:11px;color:var(--mut)}
.ab .ibtn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:rgba(255,255,255,.08);color:#dfe;border:none;font-size:18px;cursor:pointer;flex:none;font-family:inherit;position:relative}
.ab .bdg{position:absolute;top:-3px;right:-4px;background:var(--bad);color:#1a0f0f;font-size:9px;font-weight:700;padding:0 4px;border-radius:99px;min-width:15px;text-align:center}
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(var(--nh) + 12px)}
.bnav{flex:none;height:var(--nh);background:var(--bg2);border-top:1px solid var(--line);display:flex;z-index:20}
.bnav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:var(--hint);cursor:pointer;gap:3px;border:none;background:none;font-family:inherit;position:relative}
.bnav a .ic{font-size:21px;line-height:1}
.bnav a.on{color:var(--fc);font-weight:700}
.bnav a .nb{position:absolute;top:8px;right:calc(50% - 18px);background:var(--bad);color:#1a0f0f;font-size:8px;font-weight:700;padding:0 4px;border-radius:99px;min-width:14px;text-align:center}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px;margin-bottom:11px}
.chip{font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;white-space:nowrap}
.c-ok{background:var(--ok-bg);color:var(--ok)}.c-near{background:var(--near-bg);color:var(--near)}
.c-below{background:var(--below-bg);color:var(--below)}.c-bad{background:var(--bad-bg);color:var(--bad)}
.c-pend{background:var(--pend-bg);color:var(--pend)}
.mini{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:7px}
.fdot{width:9px;height:9px;border-radius:50%;display:inline-block;flex:none;vertical-align:middle;margin-right:5px}
label.fld{display:block;font-size:13px;color:var(--mut);margin:0 0 5px 1px;font-weight:600}
select,input[type=text],input[type=month],input[type=search]{font-family:inherit;font-size:15px;color:var(--ink);border:1px solid var(--line2);background:var(--card2);border-radius:10px;padding:9px 12px;width:100%}
select:focus,input:focus{outline:none;border-color:var(--fc);box-shadow:0 0 0 3px rgba(95,191,142,.15)}
::placeholder{color:var(--hint)}
.btn{font-family:inherit;font-size:15px;font-weight:700;border:none;border-radius:11px;padding:12px 16px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%}
.btn:active{opacity:.82}
.btn.prim{background:var(--fc);color:#08130d}
.btn.sec{background:var(--card2);color:var(--ink);border:1px solid var(--line2)}
.btn.sm{font-size:13px;font-weight:600;padding:8px 13px;width:auto;border-radius:9px}
.btn.cta{font-size:17px;padding:16px;border-radius:13px;box-shadow:0 0 0 1px rgba(95,191,142,.3)}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.sec-h{font-size:12.5px;font-weight:700;color:var(--mut);padding:12px 2px 7px;letter-spacing:.3px}
.prog{height:9px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:6px}
.prog i{display:block;height:100%;background:var(--fc);border-radius:99px;transition:width .3s}
.stepper{display:flex;align-items:center;gap:8px}
.stepper button{width:38px;height:38px;border-radius:10px;border:1px solid var(--line2);background:var(--card2);font-size:21px;cursor:pointer;color:var(--ink);flex:none;font-family:inherit}
.qty{min-width:30px;text-align:center;font-size:20px;font-weight:700}
.lot{display:flex;align-items:center;gap:7px;margin-top:9px}
.lot input[type=month]{flex:1;padding:8px 10px;font-size:14px}
.lot .rm{width:34px;height:34px;border-radius:8px;border:1px solid var(--line2);background:var(--card2);color:var(--bad);font-size:15px;cursor:pointer;flex:none;font-family:inherit}
.addlot{font-size:13px;font-weight:700;color:var(--fc);background:var(--fb);border:1px solid var(--ok-bd);border-radius:9px;padding:8px 13px;cursor:pointer;font-family:inherit}
.nostock{font-size:13px;font-weight:600;color:var(--mut);background:var(--card2);border:1px solid var(--line2);border-radius:9px;padding:8px 13px;cursor:pointer;font-family:inherit}
.s4{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.s2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi{border-radius:12px;padding:12px 13px;border:1px solid}
.kpi .top{display:flex;align-items:center;gap:7px}
.kpi .n{font-size:25px;font-weight:700;line-height:1}
.kpi .ic{font-size:17px}
.kpi .l{font-size:11.5px;color:var(--mut);margin-top:3px}
.k-ok{background:var(--ok-bg);border-color:var(--ok-bd)}
.k-near{background:var(--near-bg);border-color:var(--near-bd)}
.k-below{background:var(--below-bg);border-color:var(--below-bd)}
.k-bad{background:var(--bad-bg);border-color:var(--bad-bd)}
.sbox{border-radius:11px;padding:10px 8px;text-align:center}
.sbox .n{font-size:21px;font-weight:700;line-height:1.1}
.sbox .l{font-size:11px;margin-top:3px;line-height:1.3}
.flist{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-left:5px solid var(--fc);border-radius:10px;padding:10px 13px;margin-bottom:8px;cursor:pointer}
.flist:active{background:var(--card2)}
.acti{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.acti:last-child{border-bottom:none;padding-bottom:2px}
.irow{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.fmenu{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mb{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:0;cursor:pointer;text-align:left;font-family:inherit;overflow:hidden;display:flex;flex-direction:column}
.mb:active{background:var(--card2)}
.mb .mbar{height:5px;width:100%}
.mb .mbody{padding:13px 12px 14px}
.mb .mic{font-size:23px;margin-bottom:7px;display:block;color:var(--fc)}
.mb .mtt{font-size:14px;font-weight:700;color:var(--ink);line-height:1.3}
.mb .msb{font-size:11.5px;color:var(--mut);margin-top:3px}
.mb.wide{grid-column:span 2;flex-direction:row;align-items:stretch}
.mb.wide .mbar{width:5px;height:auto}
.mb.wide .mbody{display:flex;align-items:center;gap:12px;padding:13px 14px;flex:1}
.mb.wide .mic{font-size:25px;margin:0;flex:none}
.seg{display:flex;gap:6px;margin-bottom:12px}
.seg button{flex:1;padding:9px 4px;border-radius:10px;border:1px solid var(--line2);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--card2);color:var(--mut)}
.seg .on{background:var(--fc);color:#08130d;border-color:var(--fc)}
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mnav button{background:none;border:none;font-size:22px;cursor:pointer;color:var(--fc);padding:4px 10px;font-family:inherit}
.mnav .label{font-size:15px;font-weight:700}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.blbl{font-size:11.5px;color:var(--mut);width:62px;text-align:right;flex:none}
.btrk{flex:1;height:18px;background:var(--bg2);border-radius:6px;overflow:hidden;position:relative}
.rk{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
.rk:last-child{border-bottom:none}
.rk .pos{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex:none}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--hint);font-size:16px;pointer-events:none}
.search-wrap input{padding-left:36px}
.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:#05201a;border:1px solid var(--ok-bd);color:#dfffef;padding:11px 18px;border-radius:11px;font-size:13.5px;z-index:99;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.empty{text-align:center;padding:40px 16px;color:var(--hint);font-size:14px}
table.rep{width:100%;border-collapse:collapse;font-size:12.5px}
table.rep th,table.rep td{border:1px solid var(--line2);padding:7px 8px;text-align:center;color:var(--ink)}
table.rep th{font-weight:700;font-size:12px;color:var(--mut)}
table.rep td.l{text-align:left}
.canvas-wrap{position:relative;height:175px}
@media print{
  body,.app{background:#fff!important}
  .bnav,.ab .ibtn,.noprint{display:none!important}
  .scr{padding:0;overflow:visible}
  #prt{display:block!important;color:#111}
}
#prt{display:none}
</style>
</head>

function F(id){return FARMS.find(x=>x.id===id)||FARMS[0]}
function CN(id){const c=CATS.find(x=>x.id===id);return c?c.name:''}
function beD(iso){const d=new Date(iso);const M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];return d.getDate()+' '+M[d.getMonth()]+' '+(d.getFullYear()+543)}
function thM(ym){if(!ym)return'';const[y,m]=ym.split('-');const M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];return M[parseInt(m)-1]+' '+(parseInt(y)+543)}
function xL(ym){if(!ym)return'—';const[y,m]=ym.split('-');return m+'/'+(parseInt(y)+543)}
function nowYM(){const n=new Date();return n.getFullYear()*12+n.getMonth()}
function daysTo(ym){if(!ym)return null;const[y,m]=ym.split('-').map(Number);const t=new Date(y,m,0);const now=new Date();return Math.round((t-now)/86400000)}
function daysSince(iso){return Math.floor((Date.now()-new Date(iso).getTime())/86400000)}
function lt(line){return(line.lots||[]).reduce((s,l)=>s+(parseInt(l.qty)||0),0)}
function nx(line){return(line.lots||[]).filter(l=>l.exp).map(l=>l.exp).sort()[0]||''}
function ls(line,item){
  if(!line||!line.touched)return'pending';
  const t=lt(line);if(t===0)return'out';
  let ex=false,nr=false;const c=nowYM();
  (line.lots||[]).forEach(l=>{if(l.exp){const[y,m]=l.exp.split('-').map(Number);const v=y*12+(m-1);if(v<c)ex=true;else if(v-c<=NM)nr=true;}});
  if(ex)return'expired';if(t<(item.min||0))return'below';if(nr)return'near';return'ok';
}
function summ(insp){const c={ok:0,near:0,below:0,expired:0,out:0,pending:0};ITEMS.forEach(it=>{const l=insp.lines[it.id]||{lots:[],touched:false};c[ls(l,it)]++;});return c}
function latF(fid){return INSPS.filter(i=>i.farmId===fid).sort((a,b)=>b.ts-a.ts)[0]||null}
function latFM(fid,ym){return INSPS.filter(i=>i.farmId===fid&&i.date.startsWith(ym)).sort((a,b)=>b.ts-a.ts)[0]||null}

      if(stk==='expired')A.push({sev:0,fid:f.id,farm:f.name,fc:f.c,title:it.name,desc:'หมดอายุแล้ว ('+xL(nx(line))+')',sub:'หมดอายุ',col:'var(--bad)',ic:'⛔'});

      else if(stk==='near'){const d=daysTo(nx(line));A.push({sev:1,fid:f.id,farm:f.name,fc:f.c,title:it.name,desc:'ใกล้หมดอายุ'+(d!=null?' ใน '+d+' วัน':''),sub:'ใกล้หมดอายุ',col:'var(--near)',ic:'⏰'});}
      else if(stk==='below')A.push({sev:1,fid:f.id,farm:f.name,fc:f.c,title:it.name,desc:'ต่ำกว่าเกณฑ์ (เหลือ '+lt(line)+' '+it.unit+')',sub:'ต่ำกว่าเกณฑ์',col:'var(--below)',ic:'🔻'});
    });
  });
  A.sort((a,b)=>a.sev-b.sev);return A;
}

      <div class="kpi k-near" style="padding:9px 10px"><div class="top" style="color:var(--near)"><span class="n" style="font-size:19px">${s.near}</span></div><div class="l">ใกล้หมด</div></div>
      <div class="kpi k-below" style="padding:9px 10px"><div class="top" style="color:var(--below)"><span class="n" style="font-size:19px">${s.below}</span></div><div class="l">ต่ำกว่า</div></div>
      <div class="kpi k-bad" style="padding:9px 10px"><div class="top" style="color:var(--bad)"><span class="n" style="font-size:19px">${s.expired+s.out}</span></div><div class="l">หมด/หมดอายุ</div></div></div></div>`;
  CATS.forEach(cat=>{h+=`<div class="sec-h">${cat.name}</div>`;ITEMS.filter(i=>i.cat===cat.id).forEach(it=>{const line=insp.lines[it.id]||{lots:[],touched:false};const sm=SM[ls(line,it)];
    h+=`<div class="irow" style="cursor:default"><div><div style="font-size:14px;font-weight:700">${it.name}</div><div style="font-size:12px;color:var(--hint);margin-top:2px">${line.touched?lt(line)+' '+it.unit:'—'}${it.exp&&nx(line)?' · หมด '+xL(nx(line)):''}</div></div><span class="chip ${sm.c}">${sm.l}</span></div>`;});});
  document.getElementById('scr').innerHTML=h;
}

function rAlerts(){
  rsTh();
  const all=buildAlerts();
  let h=`<div class="seg"><button class="on" id="al-all" onclick="alF('all')">ทั้งหมด (${all.length})</button><button id="al-act" onclick="alF('act')">ต้องดำเนินการ (${all.filter(a=>a.sev<=1).length})</button></div><div id="alr"></div>`;
  document.getElementById('scr').innerHTML=h;
  S._alMode='all';
  window.alF=function(m){S._alMode=m;document.getElementById('al-all').classList.toggle('on',m==='all');document.getElementById('al-act').classList.toggle('on',m==='act');document.getElementById('alr').innerHTML=alrHTML(all);};
  document.getElementById('alr').innerHTML=alrHTML(all);
}
function alrHTML(all){
  let list=S._alMode==='act'?all.filter(a=>a.sev<=1):all;
  if(!list.length)return`<div class="empty">ไม่มีรายการแจ้งเตือน ✓</div>`;
  return list.map(a=>`<div class="irow" style="cursor:pointer" onclick="go('farm',{fid:${a.fid}})">
    <div style="display:flex;gap:10px;min-width:0"><span style="font-size:18px">${a.ic}</span>
    <div style="min-width:0"><div style="font-size:14px;font-weight:700">${a.title}</div>
    <div style="font-size:12px;color:${a.col};margin-top:1px">${a.desc}</div>
    <div style="font-size:11px;color:var(--hint);margin-top:2px"><span class="fdot" style="background:${a.fc};width:8px;height:8px"></span>${a.farm}</div></div></div>
    <span class="chip" style="background:${a.col};color:#0c1410;opacity:.92">${a.sub}</span></div>`).join('');
}

function rFSett(){
  const f=F(S.fid);
  let h=`<div class="card" style="border-left:5px solid ${f.c}"><div style="font-size:14px;font-weight:700;margin-bottom:8px">ผู้รับผิดชอบประจำศูนย์</div>
    <input type="text" id="ri" placeholder="ชื่อ-สกุล" value="${(f.resp||'').replace(/"/g,'&quot;')}">
    <button class="btn prim" style="margin-top:10px" onclick="svR()">บันทึก</button></div>
    <div class="sec-h">จำนวนขั้นต่ำต่อรายการ</div>`;
  CATS.forEach(cat=>{h+=`<div class="sec-h" style="padding-top:4px;font-size:11.5px">${cat.name}</div>`;
    ITEMS.filter(i=>i.cat===cat.id).forEach(it=>{h+=`<div class="card" style="padding:10px 13px;margin-bottom:7px"><div class="row"><div><div style="font-size:14px;font-weight:700">${it.name}</div><div style="font-size:12px;color:var(--hint)">${it.unit}</div></div>
      <div class="stepper"><button onclick="cMin('${it.id}',-1)">−</button><span class="qty" id="mn${it.id}" style="font-size:16px">${it.min}</span><button onclick="cMin('${it.id}',1)">＋</button></div></div></div>`;});});
  h+=`<button class="btn sec" style="margin-top:6px" onclick="rsMin()">คืนค่าเริ่มต้น</button>`;
  document.getElementById('scr').innerHTML=h;
  window.svR=async function(){const v=document.getElementById('ri').value.trim();F(S.fid).resp=v;await st_set('resp_'+S.fid,v);toast('บันทึกแล้ว')};
}
async function cMin(id,d){const it=ITEMS.find(x=>x.id===id);it.min=Math.max(0,(it.min||0)+d);const el=document.getElementById('mn'+id);if(el)el.textContent=it.min;await svi()}
async function rsMin(){if(!confirm('คืนค่าขั้นต่ำทั้งหมดเป็นค่าเริ่มต้น?'))return;ITEMS.forEach(it=>{const d=DEF.find(x=>x.id===it.id);it.min=d.min});await svi();rFSett();toast('คืนค่าแล้ว')}

function rSett(){
  rsTh();
  document.getElementById('scr').innerHTML=`<div class="card"><div style="font-size:15px;font-weight:700;margin-bottom:10px">เชื่อมต่อ Google Sheet</div>
    <div style="font-size:13px;color:var(--mut);margin-bottom:10px">Sheet ID: <code style="background:var(--card2);padding:2px 6px;border-radius:5px;font-size:11px">${SID}</code></div>
    <label class="fld">ลิงก์ Web App</label>
    <input type="text" id="gu" value="${gsUrl}" placeholder="https://script.google.com/macros/s/.../exec" style="margin-bottom:10px">
    <div class="s2" style="gap:8px"><button class="btn prim sm" style="flex:1" onclick="svGs()">บันทึก</button><button class="btn sec sm" style="flex:1" onclick="tstGs()">ทดสอบ</button></div>
    <div style="font-size:12px;color:${gsUrl?'var(--ok)':'var(--hint)'};margin-top:8px">${gsUrl?'● เชื่อมต่อแล้ว':'○ ยังไม่ได้ตั้งค่า'}</div></div>
    <div class="card"><div style="font-size:15px;font-weight:700;margin-bottom:5px">🔔 แจ้งเตือน Telegram</div>
    <div style="font-size:13px;color:var(--mut);line-height:1.7">ส่วนนี้จะเพิ่มในขั้นถัดไป — ตั้งเตือนล่วงหน้าก่อนหมดอายุ และศูนย์ที่ค้างตรวจ ผ่าน Telegram อัตโนมัติ</div></div>
    <div class="card"><div style="font-size:15px;font-weight:700;margin-bottom:5px">เกี่ยวกับแอป</div>
    <div style="font-size:13px;color:var(--mut);line-height:1.8">ตรวจนับสต็อกยาและเวชภัณฑ์<br>ธุรกิจพันธุ์กุ้งทะเล 2 · CPF<br>${ITEMS.length} รายการ · ${INSPS.length} บันทึก · โหมดมืด</div></div>`;
}
async function svGs(){gsUrl=(document.getElementById('gu').value||'').trim();await st_set('gsheet_url',gsUrl);toast('บันทึกลิงก์แล้ว')}
async function tstGs(){const u=(document.getElementById('gu').value||'').trim();if(!u){toast('ใส่ลิงก์ก่อน');return}
  const p={sheetId:SID,farm:'(ทดสอบ)',date:beD(new Date().toISOString()),inspector:'ระบบ',ts:new Date().toISOString(),rows:[{category:'ทดสอบ',item:'ทดสอบการเชื่อมต่อ',unit:'-',min:0,qty:1,exp:'-',status:'ทดสอบ'}]};
  try{await fetch(u,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(p)});toast('ส่งทดสอบแล้ว — เปิดชีตตรวจสอบ')}catch(e){toast('ส่งไม่สำเร็จ')}}
async function pSh(rec){if(!gsUrl)return;
  const p={sheetId:SID,farm:F(rec.farmId).name,date:beD(rec.date),inspector:rec.inspector,ts:new Date(rec.ts).toISOString(),rows:ITEMS.map(it=>{const line=rec.lines[it.id]||{lots:[],touched:false};const stk=ls(line,it);return{category:CN(it.cat),item:it.name,unit:it.unit,min:it.min,qty:line.touched?lt(line):'',exp:it.exp&&nx(line)?xL(nx(line)):'—',status:SM[stk].l};})};
  try{await fetch(gsUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(p)});toast('ส่งข้อมูลเข้า Google Sheet แล้ว ✓')}catch(e){}}

boot();
</script>
</body>
</html>
