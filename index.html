<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ตรวจนับสต็อกยาและเวชภัณฑ์ – CPF</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f4f6f5;--card:#fff;--line:#e4e9e6;--ink:#1c2b26;--muted:#617870;--hint:#96aaa3;
  --ok:#1a7a4e;--ok-bg:#e5f3ec;--near:#9a6510;--near-bg:#fbefd5;
  --below:#a8480f;--below-bg:#fce8db;--bad:#b0312a;--bad-bg:#fbe5e3;--pend:#6a8078;--pend-bg:#eef1ef;
  --r:13px;--appbar-h:58px;--nav-h:62px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;background:var(--bg)}
body{font-family:'Sarabun',-apple-system,sans-serif;font-size:16px;color:var(--ink);-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh;max-width:520px;margin:0 auto;background:var(--bg)}
.appbar{flex:none;height:var(--appbar-h);display:flex;align-items:center;padding:0 14px;gap:10px;position:relative;z-index:20}
.appbar.themed{border-bottom:3px solid var(--farm-gold,#c8a820)}
.appbar .logo{width:40px;height:40px;border-radius:9px;background:#fff;padding:2px;object-fit:contain;flex:none}
.appbar h1{font-size:16px;font-weight:700;color:#fff;line-height:1.25}
.appbar .sub{font-size:11px;color:rgba(255,255,255,.82);font-weight:400}
.appbar .back-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:rgba(255,255,255,.18);color:#fff;border:none;font-size:19px;cursor:pointer;flex:none}
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(var(--nav-h) + 10px)}
.bottomnav{flex:none;height:var(--nav-h);background:#fff;border-top:1px solid var(--line);display:flex;align-items:stretch;z-index:20}
.bottomnav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10.5px;color:var(--muted);cursor:pointer;gap:3px;border:none;background:none;font-family:inherit;text-decoration:none;padding-bottom:2px}
.bottomnav a .ic{font-size:22px;line-height:1}
.bottomnav a.on{color:var(--farm-color,#1c7a3e);font-weight:700}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px;margin-bottom:11px}
.card.accent{border-left:5px solid var(--farm-color,#1c7a3e)}
.chip{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:99px;white-space:nowrap}
.c-ok{background:var(--ok-bg);color:var(--ok)}.c-near{background:var(--near-bg);color:var(--near)}
.c-below{background:var(--below-bg);color:var(--below)}.c-bad{background:var(--bad-bg);color:var(--bad)}
.c-pend{background:var(--pend-bg);color:var(--pend)}
label.fld{display:block;font-size:13px;color:var(--muted);margin:0 0 5px 1px;font-weight:600}
select,input[type=text],input[type=month]{font-family:inherit;font-size:15px;color:var(--ink);border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 12px;width:100%}
select:focus,input:focus{outline:none;border-color:var(--farm-color,#1c7a3e);box-shadow:0 0 0 3px rgba(0,0,0,.06)}
.btn{font-family:inherit;font-size:15px;font-weight:700;border:none;border-radius:11px;padding:12px 16px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%;transition:opacity .15s}
.btn:active{opacity:.82}
.btn.prim{background:var(--farm-color,#1c7a3e);color:#fff}
.btn.sec{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.btn.sm{font-size:13px;font-weight:600;padding:8px 13px;width:auto;border-radius:9px}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.sec-h{font-size:12.5px;font-weight:700;color:var(--muted);padding:12px 2px 7px;letter-spacing:.3px}
.progress{height:7px;background:#e6ebe8;border-radius:99px;overflow:hidden;margin-top:6px}
.progress i{display:block;height:100%;background:var(--farm-color,#1c7a3e);border-radius:99px;transition:width .3s}
.stepper{display:flex;align-items:center;gap:8px}
.stepper button{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:#fff;font-size:20px;cursor:pointer;color:var(--ink);flex:none}
.qty{min-width:28px;text-align:center;font-size:19px;font-weight:700}
.lot{display:flex;align-items:center;gap:7px;margin-top:9px}
.lot input[type=month]{flex:1;padding:8px 10px;font-size:14px}
.lot .rm{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--bad);font-size:15px;cursor:pointer;flex:none}
.addlot{font-size:13px;font-weight:700;color:var(--farm-color,#1c7a3e);background:var(--farm-bg,#e5f3ec);border:none;border-radius:9px;padding:8px 13px;cursor:pointer}
.nostock{font-size:13px;font-weight:600;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px 13px;cursor:pointer}
.stat2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.sbox{border-radius:11px;padding:10px 8px;text-align:center}
.sbox .n{font-size:22px;font-weight:800;line-height:1.1}
.sbox .l{font-size:11px;margin-top:3px;line-height:1.3}
.fdot{width:10px;height:10px;border-radius:50%;display:inline-block;flex:none;margin-right:6px;vertical-align:middle}
.mini{font-size:11px;font-weight:700;padding:3px 8px;border-radius:7px}
.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:#1c2b26;color:#fff;padding:11px 18px;border-radius:11px;font-size:13.5px;z-index:99;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
table.rep{width:100%;border-collapse:collapse;font-size:13px}
table.rep th,table.rep td{border:1px solid var(--line);padding:7px 8px;text-align:center}
table.rep th{font-weight:700;font-size:12px}
table.rep td.l{text-align:left}
.seg{display:flex;gap:6px;margin-bottom:12px}
.seg button{flex:1;padding:9px 4px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s,color .15s}
.seg .on{background:var(--farm-color,#1c7a3e);color:#fff}
.seg .off{background:var(--farm-bg,#e5f3ec);color:var(--farm-color,#1c7a3e)}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.month-nav button{background:none;border:none;font-size:20px;cursor:pointer;color:var(--farm-color,#1c7a3e);padding:4px 10px}
.month-nav .label{font-size:15px;font-weight:700;color:var(--ink)}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-lbl{font-size:12px;color:var(--muted);width:60px;text-align:right;flex:none}
.bar-track{flex:1;height:18px;background:var(--bg);border-radius:6px;overflow:hidden;position:relative}
.farm-hero{padding:14px 15px 16px;color:#fff}
.farm-menu{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.menu-btn{background:#fff;border:1.5px solid var(--line);border-radius:13px;padding:16px 12px;cursor:pointer;text-align:left;font-family:inherit;transition:border-color .15s}
.menu-btn:active{background:var(--farm-bg,#e5f3ec)}
.menu-btn .mic{font-size:26px;margin-bottom:8px;display:block}
.menu-btn .mtitle{font-size:14px;font-weight:700;color:var(--ink);line-height:1.3}
.menu-btn .msub{font-size:11.5px;color:var(--muted);margin-top:3px}
.menu-btn.wide{grid-column:span 2;display:flex;align-items:center;gap:14px;padding:14px 16px}
.menu-btn.wide .mic{font-size:30px;margin:0;flex:none}
.irow{background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;cursor:pointer}
.farmcard{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:13px 15px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px}
.canvas-wrap{position:relative;height:160px;margin:8px 0}
@media print{
  body{background:#fff}
  .bottomnav,.appbar .back-btn,.noprint{display:none!important}
  .scr{padding:0;overflow:visible}
  #print-area{display:block!important}
}
#print-area{display:none}
</style>
</head>

async function ss(k,v){if(window.storage){try{await window.storage.set(k,v);return}catch(e){}}try{localStorage.setItem(k,v);return}catch(e){}mem[k]=v}

// Helpers
function farm(id){return FARMS.find(x=>x.id===id)||FARMS[0]}
function catName(id){const c=CATS.find(x=>x.id===id);return c?c.name:''}
function beDate(iso){const d=new Date(iso);const M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];return d.getDate()+' '+M[d.getMonth()]+' '+(d.getFullYear()+543)}
function thMonth(ym){if(!ym)return'';const [y,m]=ym.split('-');const M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];return M[parseInt(m)-1]+' '+(parseInt(y)+543)}
function expLabel(ym){if(!ym)return'—';const [y,m]=ym.split('-');return m+'/'+(parseInt(y)+543)}
function nowYM(){const n=new Date();return n.getFullYear()*12+n.getMonth()}
function lineTotal(line){return(line.lots||[]).reduce((s,l)=>s+(parseInt(l.qty)||0),0)}
function nearestExp(line){return(line.lots||[]).filter(l=>l.exp).map(l=>l.exp).sort()[0]||''}
function lineStatus(line,item){
  if(!line||!line.touched)return'pending';
  const total=lineTotal(line);if(total===0)return'out';
  let expired=false,near=false;const cur=nowYM();
  (line.lots||[]).forEach(l=>{if(l.exp){const [y,m]=l.exp.split('-').map(Number);const v=y*12+(m-1);if(v<cur)expired=true;else if(v-cur<=NEAR_MONTHS)near=true;}});
  if(expired)return'expired';if(total<(item.min||0))return'below';if(near)return'near';return'ok';
}
function summarize(insp){const c={ok:0,near:0,below:0,expired:0,out:0,pending:0};ITEMS.forEach(it=>{const line=insp.lines[it.id]||{lots:[],touched:false};c[lineStatus(line,it)]++;});return c}
function latestForFarm(fid){return INSPECTIONS.filter(i=>i.farmId===fid).sort((a,b)=>b.ts-a.ts)[0]||null}
function inspForFarmMonth(fid,ym){return INSPECTIONS.filter(i=>i.farmId===fid&&i.date.startsWith(ym)).sort((a,b)=>b.ts-a.ts)[0]||null}
function setTheme(f){const root=document.documentElement;root.style.setProperty('--farm-color',f.color);root.style.setProperty('--farm-bg',f.bg);root.style.setProperty('--farm-gold',f.gold)}
function resetTheme(){document.documentElement.style.setProperty('--farm-color','#1c7a3e');document.documentElement.style.setProperty('--farm-bg','#e5f3ec');document.documentElement.style.setProperty('--farm-gold','#c8a820')}

function itemHTML(it){
  const line=st.draft.lines[it.id];const sm=STATUS[lineStatus(line,it)];
  let body='';
  if(!line.touched){
    body=`<div class="row" style="margin-top:11px;gap:8px"><button class="addlot" style="flex:1" onclick="firstLot('${it.id}')">＋ ระบุจำนวน</button><button class="nostock" onclick="markNone('${it.id}')">ไม่มีของ</button></div>`;
  } else {
    const lots=(line.lots||[]).map((l,i)=>`<div class="lot">
      <div class="stepper"><button onclick="chQty('${it.id}',${i},-1)">−</button><span class="qty" id="q-${it.id}-${i}">${parseInt(l.qty)||0}</span><button onclick="chQty('${it.id}',${i},1)">＋</button></div>
      ${it.exp?`<input type="month" value="${l.exp||''}" onchange="setExp('${it.id}',${i},this.value)">`:
                `<span style="flex:1;font-size:13px;color:var(--hint)">ไม่มีวันหมดอายุ</span>`}
      <button class="rm" onclick="rmLot('${it.id}',${i})">✕</button></div>`).join('');
    body=`${lots||`<div style="font-size:13px;color:var(--hint);margin-top:8px">บันทึกว่าไม่มีของ</div>`}
    <div class="row" style="margin-top:10px"><button class="addlot" onclick="addLot('${it.id}')">＋ เพิ่มล็อต</button>
    <span style="font-size:12px;color:var(--hint)">รวม ${lineTotal(line)} ${it.unit}</span></div>`;
  }
  return `<div class="card" id="card-${it.id}" style="margin-bottom:10px">
    <div class="row" style="align-items:flex-start">
      <div style="min-width:0"><div style="font-size:15.5px;font-weight:700">${it.name}</div>
        <div style="font-size:12px;color:var(--hint);margin-top:2px">หน่วย: ${it.unit} · ขั้นต่ำ ${it.min}</div></div>
      <span class="chip ${sm.c}" id="chip-${it.id}">${sm.l}</span></div>${body}</div>`;
}
function reCard(id){const it=ITEMS.find(x=>x.id===id);const el=document.getElementById('card-'+id);if(el)el.outerHTML=itemHTML(it);updateProg()}
function refreshChip(id){const it=ITEMS.find(x=>x.id===id);const line=st.draft.lines[id];const sm=STATUS[lineStatus(line,it)];const chip=document.getElementById('chip-'+id);if(chip){chip.className='chip '+sm.c;chip.textContent=sm.l;}updateProg()}
function firstLot(id){st.draft.lines[id]={lots:[{qty:1,exp:''}],touched:true};reCard(id)}
function markNone(id){st.draft.lines[id]={lots:[],touched:true};reCard(id)}
function addLot(id){st.draft.lines[id].lots.push({qty:1,exp:''});st.draft.lines[id].touched=true;reCard(id)}
function rmLot(id,i){st.draft.lines[id].lots.splice(i,1);reCard(id)}
function chQty(id,i,d){const l=st.draft.lines[id].lots[i];l.qty=Math.max(0,(parseInt(l.qty)||0)+d);st.draft.lines[id].touched=true;const el=document.getElementById('q-'+id+'-'+i);if(el)el.textContent=l.qty;refreshChip(id)}
function setExp(id,i,v){st.draft.lines[id].lots[i].exp=v;st.draft.lines[id].touched=true;refreshChip(id)}
function updateProg(){let done=0;ITEMS.forEach(it=>{if(st.draft&&st.draft.lines[it.id]&&st.draft.lines[it.id].touched)done++;});const pt=document.getElementById('progTxt');const pb=document.getElementById('progBar');if(pt)pt.textContent=done+' / '+ITEMS.length;if(pb)pb.style.width=Math.round(done/ITEMS.length*100)+'%'}
async function saveInspect(){
  if(!ITEMS.some(it=>st.draft.lines[it.id].touched)){toast('ยังไม่ได้ตรวจรายการใดเลย');return}
  if(!(st.inspector||'').trim()){toast('กรุณาระบุชื่อผู้ตรวจ');return}
  const done=ITEMS.filter(it=>st.draft.lines[it.id].touched).length;
  if(done<ITEMS.length&&!confirm(`ตรวจแล้ว ${done}/${ITEMS.length} รายการ\nรายการที่เหลือจะบันทึกเป็น "ยังไม่ตรวจ" — ยืนยัน?`))return;
  const rec={id:'i'+Date.now(),farmId:st.farmId,date:new Date().toISOString(),ts:Date.now(),inspector:st.inspector.trim(),lines:JSON.parse(JSON.stringify(st.draft.lines))};
  INSPECTIONS.push(rec);await saveInsp();await ss('inspector',st.inspector.trim());
  st.draft=null;pushToSheet(rec);toast('บันทึกการตรวจเรียบร้อย ✓');go('farm',{farmId:st.farmId});
}

  </div>`;
  let ovMode='all';
  function rows(mode){
    let r='';

        const line=li.lines[it.id]||{lots:[],touched:false};const stk=lineStatus(line,it);const sm=STATUS[stk];

          <div><div style="font-size:14.5px;font-weight:700">${it.name}</div>

// REPORT
function renderReport(){
  const f=farm(st.farmId);
  const now=new Date();const curYM=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  if(!st.reportMonth)st.reportMonth=curYM;
  function changeMonth(d){const [y,m]=st.reportMonth.split('-').map(Number);let nm=m+d;let ny=y;if(nm>12){nm=1;ny++}if(nm<1){nm=12;ny--}st.reportMonth=ny+'-'+String(nm).padStart(2,'0');renderReport()}
  const allInsp=INSPECTIONS.filter(i=>i.farmId===st.farmId).sort((a,b)=>a.ts-b.ts);
  const isMonth=st.reportMode==='month';
  const li=isMonth?inspForFarmMonth(st.farmId,st.reportMonth):latestForFarm(st.farmId);
  const s=li?summarize(li):{ok:0,near:0,below:0,expired:0,out:0,pending:28};
  const prob=s.expired+s.out+s.below+s.near;

  // trend data (6 periods)
  const trends=[];
  for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);const ym=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');const ti=inspForFarmMonth(st.farmId,ym);const ts2=ti?summarize(ti):{ok:0,near:0,below:0,expired:0,out:0,pending:0};trends.push({ym,label:thMonth(ym).split(' ')[0],val:ts2.near+ts2.below+ts2.expired+ts2.out,has:!!ti});}
  const maxT=Math.max(...trends.map(t=>t.val),1);

  // action items
  const actions=[];
  if(li){ITEMS.forEach(it=>{const line=li.lines[it.id]||{lots:[],touched:false};const stk=lineStatus(line,it);if(['expired','out','below','near'].includes(stk))actions.push({it,stk,total:lineTotal(line),ne:nearestExp(line)});});}
  actions.sort((a,b)=>['expired','out','below','near'].indexOf(a.stk)-['expired','out','below','near'].indexOf(b.stk));

  let h=`<div class="seg"><button class="${isMonth?'on':'off'}" onclick="st.reportMode='month';renderReport()">รายเดือน</button>
    <button class="${!isMonth?'on':'off'}" onclick="st.reportMode='all';renderReport()">ทั้งหมด (ล่าสุด)</button></div>`;
  if(isMonth)h+=`<div class="month-nav"><button onclick="(${changeMonth.toString()})(-1)">‹</button><div class="label">${thMonth(st.reportMonth)}</div><button onclick="(${changeMonth.toString()})(1)">›</button></div>`;
  if(!li){h+=`<div class="card" style="text-align:center;padding:20px;color:var(--hint)">ไม่มีข้อมูล${isMonth?'ในเดือนนี้':''}<br>กด "ตรวจนับสต็อก" เพื่อเริ่ม</div>`;document.getElementById('scr').innerHTML=h;return}
  h+=`<div style="font-size:12px;color:var(--muted);margin-bottom:10px">ตรวจ ${beDate(li.date)} · ${li.inspector}${isMonth?` · ${INSPECTIONS.filter(i=>i.farmId===st.farmId&&i.date.startsWith(st.reportMonth)).length} ครั้ง`:''}</div>`;

  h+=`<div class="stat4" style="margin-bottom:14px">
    <div class="sbox" style="background:var(--ok-bg)"><div class="n" style="color:var(--ok)">${s.ok}</div><div class="l" style="color:var(--ok)">ปกติ</div></div>
    <div class="sbox" style="background:var(--near-bg)"><div class="n" style="color:var(--near)">${s.near}</div><div class="l" style="color:var(--near)">ใกล้หมด</div></div>
    <div class="sbox" style="background:var(--below-bg)"><div class="n" style="color:var(--below)">${s.below}</div><div class="l" style="color:var(--below)">ต่ำกว่า</div></div>
    <div class="sbox" style="background:var(--bad-bg)"><div class="n" style="color:var(--bad)">${s.expired+s.out}</div><div class="l" style="color:var(--bad)">หมด/<br>หมดอายุ</div></div>
  </div>`;

  h+=`<div class="sec-h">แนวโน้ม 6 เดือน (รายการต้องดูแล)</div><div class="card" style="padding:14px 15px 10px">
    <div style="display:flex;align-items:flex-end;gap:5px;height:80px;margin-bottom:6px">`;
  trends.forEach(t=>{
    const pct=t.has?Math.max(6,Math.round(t.val/maxT*100)):0;
    const col=t.val>3?'var(--bad)':t.val>1?'var(--near)':'var(--ok)';
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
      ${t.has?`<div style="font-size:10px;font-weight:700;color:${col}">${t.val}</div>`:
               `<div style="font-size:10px;color:var(--hint)">—</div>`}
      <div style="width:100%;height:${pct}%;background:${t.has?col:'var(--line)'};border-radius:5px 5px 0 0;min-height:4px"></div>
    </div>`});
  h+=`</div><div style="display:flex;gap:5px">`;
  trends.forEach(t=>h+=`<div style="flex:1;text-align:center;font-size:10px;color:var(--hint)">${t.label}</div>`);
  h+=`</div></div>`;

  h+=`<div class="sec-h">สถานะรายหมวด</div><div class="card">`;
  CATS.forEach(cat=>{
    const its=ITEMS.filter(i=>i.cat===cat.id);let ok=0,bad=0;
    its.forEach(it=>{const line=li.lines[it.id]||{lots:[],touched:false};const stk=lineStatus(line,it);if(stk==='ok')ok++;else if(stk!=='pending')bad++;});
    const total=ok+bad;const pct=total?Math.round(ok/total*100):0;
    h+=`<div class="bar-row"><div class="bar-lbl">${cat.name.split('/')[0].trim()}</div>
      <div class="bar-track"><div style="height:100%;width:${pct}%;background:var(--farm-color);border-radius:5px 0 0 5px;display:flex;align-items:center;padding-left:5px">${ok>0?`<span style="font-size:10px;font-weight:700;color:#fff">${ok}</span>`:''}</div>
      ${bad>0?`<div style="position:absolute;right:0;top:0;height:100%;width:${100-pct}%;background:var(--bad-bg);border-radius:0 5px 5px 0;display:flex;align-items:center;justify-content:center"><span style="font-size:10px;font-weight:700;color:var(--bad)">${bad}</span></div>`:''}
      </div><div style="font-size:11px;font-weight:700;color:var(--farm-color);width:22px">${total}</div></div>`;
  });
  h+=`</div>`;

  if(actions.length){
    h+=`<div class="sec-h">รายการต้องดำเนินการ (${actions.length})</div>`;
    actions.forEach(a=>{const sm=STATUS[a.stk];
      h+=`<div class="irow" style="cursor:default"><div><div style="font-size:14px;font-weight:700">${a.it.name}</div>
        <div style="font-size:12px;color:var(--hint);margin-top:2px">มี ${a.total} ${a.it.unit} · ขั้นต่ำ ${a.it.min}${a.ne?' · หมด '+expLabel(a.ne):''}</div></div>
        <span class="chip ${sm.c}">${sm.l}</span></div>`;});
  }

  h+=`<div class="sec-h">ออกรายงาน</div>
    <div class="stat2"><button class="btn prim" onclick="printSummary()">PDF สรุป 1 หน้า</button>
    <button class="btn sec" onclick="printDetail()">PDF รายละเอียด</button></div>
    <button class="btn sec" style="margin-top:10px" onclick="exportCSV()">ดาวน์โหลด Excel (CSV)</button>`;
  document.getElementById('scr').innerHTML=h;

  window.printSummary=function(){buildPrint(li,s,actions,false)}
  window.printDetail=function(){buildPrint(li,s,actions,true)}
}

function exportCSV(){
  const f=farm(st.farmId);const li=st.reportMode==='month'?inspForFarmMonth(st.farmId,st.reportMonth):latestForFarm(st.farmId);
  if(!li){toast('ไม่มีข้อมูลในช่วงนี้');return}
  let rows=[['ศูนย์','วันที่ตรวจ','ผู้ตรวจ','หมวด','รายการ','หน่วย','ขั้นต่ำ','คงเหลือ','วันหมดอายุ','สถานะ']];
  ITEMS.forEach(it=>{const line=li.lines[it.id]||{lots:[],touched:false};rows.push([f.name,beDate(li.date),li.inspector,catName(it.cat),it.name,it.unit,it.min,line.touched?lineTotal(line):'',it.exp&&nearestExp(line)?expLabel(nearestExp(line)):'—',STATUS[lineStatus(line,it)].l]);});
  const csv=rows.map(r=>r.map(c=>{c=String(c);return/[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c}).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;
  const d=new Date();a.download=`stock_${f.name}_${d.getFullYear()+543}${String(d.getMonth()+1).padStart(2,'0')}.csv`;
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);toast('ดาวน์โหลด CSV แล้ว')
}

}
async function chMin(id,d){const it=ITEMS.find(x=>x.id===id);it.min=Math.max(0,(it.min||0)+d);const el=document.getElementById('min-'+id);if(el)el.textContent=it.min;await saveItems()}
async function resetMin(){if(!confirm('คืนค่าขั้นต่ำทั้งหมดเป็นค่าเริ่มต้น?'))return;ITEMS.forEach(it=>{const d=DEF_ITEMS.find(x=>x.id===it.id);it.min=d.min});await saveItems();renderFarmSettings();toast('คืนค่าแล้ว')}

// GLOBAL SETTINGS
function renderSettings(){
  resetTheme();
  document.getElementById('scr').innerHTML=`<div class="card"><div style="font-size:15px;font-weight:700;margin-bottom:10px">เชื่อมต่อ Google Sheet</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:10px">Sheet ID: <code style="background:var(--bg);padding:2px 6px;border-radius:5px;font-size:12px">${SHEET_ID}</code></div>
    <label class="fld">ลิงก์ Web App</label>
    <input type="text" id="gsUrl" value="${gsheetUrl}" placeholder="https://script.google.com/macros/s/.../exec" style="margin-bottom:10px">
    <div class="stat2" style="gap:8px"><button class="btn prim sm" style="flex:1" onclick="saveGs()">บันทึก</button>
    <button class="btn sec sm" style="flex:1" onclick="testGs()">ทดสอบ</button></div>
    <div style="font-size:12px;color:${gsheetUrl?'var(--ok)':'var(--hint)'};margin-top:8px" id="gsStat">${gsheetUrl?'● เชื่อมต่อแล้ว':'○ ยังไม่ได้ตั้งค่า'}</div></div>
    <div class="card"><div style="font-size:15px;font-weight:700;margin-bottom:4px">เกี่ยวกับแอป</div>
    <div style="font-size:13px;color:var(--muted);line-height:1.7">ตรวจนับสต็อกยาและเวชภัณฑ์<br>ธุรกิจพันธุ์กุ้งทะเล 2 · CPF<br><span style="font-size:12px">รายการ ${ITEMS.length} รายการ · ${INSPECTIONS.length} บันทึก</span></div></div>`;
}
async function saveGs(){gsheetUrl=(document.getElementById('gsUrl').value||'').trim();await ss('gsheet_url',gsheetUrl);document.getElementById('gsStat').textContent=gsheetUrl?'● เชื่อมต่อแล้ว':'○ ยังไม่ได้ตั้งค่า';document.getElementById('gsStat').style.color=gsheetUrl?'var(--ok)':'var(--hint)';toast('บันทึกลิงก์แล้ว')}
async function testGs(){const u=(document.getElementById('gsUrl').value||'').trim();if(!u){toast('ใส่ลิงก์ก่อน');return}
  const p={sheetId:SHEET_ID,farm:'(ทดสอบ)',date:beDate(new Date().toISOString()),inspector:'ระบบ',ts:new Date().toISOString(),rows:[{category:'ทดสอบ',item:'ทดสอบการเชื่อมต่อ',unit:'-',min:0,qty:1,exp:'-',status:'ทดสอบ'}]};
  try{await fetch(u,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(p)});toast('ส่งทดสอบแล้ว — เปิดชีตเช็กแถวใหม่')}
  catch(e){toast('ส่งไม่สำเร็จ — ตรวจสอบลิงก์/สิทธิ์')}}
async function pushToSheet(rec){if(!gsheetUrl)return;
  const payload={sheetId:SHEET_ID,farm:farm(rec.farmId).name,date:beDate(rec.date),inspector:rec.inspector,ts:new Date(rec.ts).toISOString(),rows:ITEMS.map(it=>{const line=rec.lines[it.id]||{lots:[],touched:false};const stk=lineStatus(line,it);return{category:catName(it.cat),item:it.name,unit:it.unit,min:it.min,qty:line.touched?lineTotal(line):'',exp:it.exp&&nearestExp(line)?expLabel(nearestExp(line)):'—',status:STATUS[stk].l};})};
  try{await fetch(gsheetUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});toast('ส่งข้อมูลเข้า Google Sheet แล้ว ✓')}
  catch(e){toast('ส่ง Sheet ไม่สำเร็จ')}}

boot();
</script>
</body>
</html>
