<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ตรวจนับสต็อกยาและเวชภัณฑ์ – CPF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#1c7a3e; --teal-d:#145d2e; --teal-l:#e7f2ea;
    --navy:#18386a; --gold:#9a8a1e; --gold-l:#f3eecf;
    --bg:#f5f7f6; --card:#ffffff; --line:#e7eae8;
    --ink:#1d2b27; --muted:#6a7873; --hint:#9aa7a2;
    --ok:#16794f; --ok-bg:#e6f3ec;
    --near:#9a6510; --near-bg:#fbefd7;
    --below:#a8480f; --below-bg:#fce9dd;
    --bad:#b0322a; --bad-bg:#fbe6e3;
    --pend:#7b8a85; --pend-bg:#eef1ef;
    --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:'Sarabun',-apple-system,'Segoe UI','Noto Sans Thai',sans-serif;
    background:var(--bg);color:var(--ink);font-size:16px;line-height:1.5;
    -webkit-font-smoothing:antialiased;padding-bottom:78px}
  .wrap{max-width:520px;margin:0 auto;min-height:100vh;background:var(--bg)}
  .appbar{position:sticky;top:0;z-index:30;background:var(--teal);color:#fff;
    padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
    border-bottom:3px solid var(--gold);box-shadow:0 1px 0 rgba(0,0,0,.04)}
  .logo{width:44px;height:44px;border-radius:10px;background:#fff;padding:3px;object-fit:contain;flex:none}
  .appbar h1{font-size:18px;font-weight:600;margin:0;letter-spacing:.2px}
  .appbar .sub{font-size:12px;opacity:.85;font-weight:400}
  .content{padding:16px 16px 24px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 16px;margin-bottom:12px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .muted{color:var(--muted)} .hint{color:var(--hint);font-size:13px}
  label.fld{display:block;font-size:13px;color:var(--muted);margin:0 0 5px 2px;font-weight:500}
  select,input{font-family:inherit;font-size:16px;color:var(--ink);
    border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 12px;width:100%}
  select:focus,input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-l)}
  .btn{font-family:inherit;font-size:15px;font-weight:600;border:none;border-radius:11px;
    padding:12px 16px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%}
  .btn.primary{background:var(--teal);color:#fff}
  .btn.primary:active{background:var(--teal-d)}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn.sm{font-size:13px;font-weight:500;padding:8px 12px;width:auto;border-radius:9px}
  .chip{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:999px;white-space:nowrap}
  .c-ok{background:var(--ok-bg);color:var(--ok)} .c-near{background:var(--near-bg);color:var(--near)}
  .c-below{background:var(--below-bg);color:var(--below)} .c-bad{background:var(--bad-bg);color:var(--bad)}
  .c-pend{background:var(--pend-bg);color:var(--pend)}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex:none}
  .sec-h{display:flex;align-items:center;justify-content:space-between;
    padding:14px 4px 8px;font-size:13px;font-weight:600;color:var(--muted);
    text-transform:none;letter-spacing:.2px}
  .progress{height:7px;background:#e9edeb;border-radius:999px;overflow:hidden;margin-top:6px}
  .progress>i{display:block;height:100%;background:var(--teal);transition:width .25s}
  .stepper{display:flex;align-items:center;gap:8px}
  .stepper button{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);
    background:#fff;font-size:20px;line-height:1;cursor:pointer;color:var(--ink);padding:0;flex:none}
  .stepper button:active{background:var(--bg)}
  .qty{min-width:30px;text-align:center;font-size:19px;font-weight:600}
  .lot{display:flex;align-items:center;gap:8px;margin-top:10px}
  .lot input[type=month]{flex:1;padding:8px 10px;font-size:14px}
  .lot .rm{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:#fff;
    color:var(--bad);font-size:16px;cursor:pointer;flex:none;padding:0}
  .item-name{font-size:15.5px;font-weight:600;line-height:1.35;padding-right:8px}
  .meta{font-size:12.5px;color:var(--hint);margin-top:2px}
  .addlot{font-size:13px;font-weight:600;color:var(--teal);background:var(--teal-l);
    border:none;border-radius:9px;padding:8px 12px;cursor:pointer}
  .nostock{font-size:13px;font-weight:500;color:var(--muted);background:#fff;
    border:1px solid var(--line);border-radius:9px;padding:8px 12px;cursor:pointer}
  .stat{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat .box{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .stat .box .n{font-size:26px;font-weight:700;line-height:1.1}
  .stat .box .l{font-size:12.5px;color:var(--muted);margin-top:2px}
  .farmcard{display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;
    margin-bottom:10px;cursor:pointer}
  .farmcard:active{background:var(--bg)}
  .farmcard .nm{font-size:15.5px;font-weight:600}
  .farmcard .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
  .mini{font-size:11px;font-weight:600;padding:3px 8px;border-radius:7px}
  .histrow{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;
    margin-bottom:10px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px}
  table.rep{width:100%;border-collapse:collapse;font-size:13px}
  table.rep th,table.rep td{border:1px solid var(--line);padding:7px 8px;text-align:center}
  table.rep th{background:var(--teal-l);color:var(--teal-d);font-weight:600;font-size:12px}
  table.rep td.l{text-align:left}
  .bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:#fff;
    border-top:1px solid var(--line);display:flex;max-width:520px;margin:0 auto}
  .bottomnav a{flex:1;text-align:center;padding:9px 2px 8px;font-size:11px;color:var(--muted);
    cursor:pointer;text-decoration:none;border:none;background:none;font-family:inherit}
  .bottomnav a .ic{font-size:21px;display:block;line-height:1;margin-bottom:3px}
  .bottomnav a.on{color:var(--teal);font-weight:600}
  .empty{text-align:center;color:var(--hint);padding:40px 16px;font-size:14px}
  .toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%);background:var(--ink);
    color:#fff;padding:11px 18px;border-radius:10px;font-size:14px;z-index:60;opacity:0;
    transition:opacity .25s,transform .25s;pointer-events:none;max-width:90%}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  .acc-toggle{cursor:pointer;user-select:none}
  .legend{display:flex;flex-wrap:wrap;gap:10px;font-size:12px;color:var(--muted);margin:2px 2px 10px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  @media print{
    body{background:#fff;padding:0}
    .appbar,.bottomnav,.noprint{display:none!important}
    .wrap{max-width:100%}
    .content{padding:0}
    #report-print{display:block!important}
    .card{border:1px solid #ccc;break-inside:avoid}
  }
  #report-print{display:none}
</style>
</head>

const NEAR_MONTHS = 3; // เกณฑ์ "ใกล้หมดอายุ" (เดือน) ปรับได้
const SHEET_ID = '16QI0_rnjBPhwiDMeYWaWd09F3qbKG-kOxUoUhsujeJU';
const GSHEET_URL = 'https://script.google.com/macros/s/AKfycbxJVqLsIgvXqMwUuGuqLk3fsQ7KYJugX9wwXo-_l8KsaMJh9flPdIgB_YzaaL9Wc2E/exec';

/* ---------- ที่เก็บข้อมูล ---------- */
const mem = {};
async function storeGet(k){
  if(window.storage){ try{ const r=await window.storage.get(k); return r? r.value : null }catch(e){} }
  try{ const v=localStorage.getItem(k); if(v!==null) return v }catch(e){}
  return mem[k] ?? null;
}
async function storeSet(k,v){
  if(window.storage){ try{ await window.storage.set(k,v); return }catch(e){} }
  try{ localStorage.setItem(k,v); return }catch(e){}
  mem[k]=v;
}

/* ---------- สถานะแอป ---------- */
let ITEMS = DEFAULT_ITEMS.map(x=>({...x}));
let INSPECTIONS = [];
let lastInspector = '';
let gsheetUrl = '';
let state = { view:'home', farmId:1, draft:null, inspector:'', histFarm:'all', reportFarm:'all', detailId:null };

async function boot(){
  const ci = await storeGet('items_config');
  if(ci){ try{ const saved=JSON.parse(ci);
    ITEMS = DEFAULT_ITEMS.map(d=>{ const s=saved.find(x=>x.id===d.id); return s? {...d, min:s.min} : {...d}; });
  }catch(e){} }
  const ins = await storeGet('inspections');
  if(ins){ try{ INSPECTIONS = JSON.parse(ins)||[] }catch(e){ INSPECTIONS=[] } }
  lastInspector = (await storeGet('last_inspector'))||'';
  gsheetUrl = (await storeGet('gsheet_url'))||GSHEET_URL;
  state.inspector = lastInspector;
  go('home');
}
async function saveItems(){ await storeSet('items_config', JSON.stringify(ITEMS.map(i=>({id:i.id,min:i.min})))); }
async function saveInspections(){ await storeSet('inspections', JSON.stringify(INSPECTIONS)); }

/* ---------- ตัวช่วย ---------- */
function farmName(id){ const f=FARMS.find(x=>x.id===id); return f?f.name:'' }
function beDate(iso){ const d=new Date(iso); const m=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return d.getDate()+' '+m[d.getMonth()]+' '+(d.getFullYear()+543); }
function expLabel(ym){ if(!ym) return '—'; const [y,m]=ym.split('-'); return m+'/'+(parseInt(y)+543); }
function nowYM(){ const n=new Date(); return n.getFullYear()*12+n.getMonth(); }
function lineTotal(line){ return (line.lots||[]).reduce((s,l)=>s+(parseInt(l.qty)||0),0); }
function nearestExp(line){ const xs=(line.lots||[]).filter(l=>l.exp).map(l=>l.exp).sort(); return xs[0]||''; }
function lineStatus(line,item){
  if(!line || !line.touched) return 'pending';
  const total = lineTotal(line);
  if(total===0) return 'out';
  let expired=false, near=false; const cur=nowYM();
  (line.lots||[]).forEach(l=>{ if(l.exp){ const [y,m]=l.exp.split('-').map(Number); const v=y*12+(m-1);
    if(v<cur) expired=true; else if(v-cur<=NEAR_MONTHS) near=true; } });
  if(expired) return 'expired';
  if(total < (item.min||0)) return 'below';
  if(near) return 'near';
  return 'ok';
}
function latestForFarm(fid){ return INSPECTIONS.filter(i=>i.farmId===fid).sort((a,b)=>b.ts-a.ts)[0]||null; }
function summarize(insp){
  const c={ok:0,near:0,below:0,expired:0,out:0,pending:0};
  ITEMS.forEach(it=>{ const line=insp.lines[it.id]||{lots:[],touched:false}; c[lineStatus(line,it)]++; });
  return c;
}

/* ---------- เนวิเกชัน ---------- */
function go(v){
  state.view=v;
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('on',a.dataset.v===v));
  window.scrollTo(0,0);
  if(v==='home') renderHome();
  else if(v==='inspect') renderInspect();
  else if(v==='history') renderHistory();
  else if(v==='report') renderReport();
  else if(v==='settings') renderSettings();
}
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }

/* ---------- หน้าหลัก ---------- */
function renderHome(){
  let problems=0, farmsChecked=0;
  FARMS.forEach(f=>{ const li=latestForFarm(f.id); if(li){ farmsChecked++; const s=summarize(li);
    problems += s.near+s.below+s.expired+s.out; } });
  let html = `<div class="stat" style="margin-bottom:6px">
    <div class="box"><div class="n">${farmsChecked}/5</div><div class="l">ศูนย์ที่ตรวจแล้ว</div></div>
    <div class="box"><div class="n" style="color:${problems?'var(--bad)':'var(--ok)'}">${problems}</div><div class="l">รายการที่ต้องดูแล</div></div>
  </div>`;
  html += `<div class="sec-h">ภาพรวมรายศูนย์</div>`;
  FARMS.forEach(f=>{
    const li=latestForFarm(f.id);
    let badges='', date='ยังไม่เคยตรวจ';
    if(li){ const s=summarize(li); date='ตรวจล่าสุด '+beDate(li.date);
      const parts=[];
      if(s.expired) parts.push(`<span class="mini c-bad">หมดอายุ ${s.expired}</span>`);
      if(s.out) parts.push(`<span class="mini c-bad">หมด ${s.out}</span>`);
      if(s.below) parts.push(`<span class="mini c-below">ต่ำกว่าเกณฑ์ ${s.below}</span>`);
      if(s.near) parts.push(`<span class="mini c-near">ใกล้หมดอายุ ${s.near}</span>`);
      if(!parts.length) parts.push(`<span class="mini c-ok">ครบถ้วน</span>`);
      if(s.pending) parts.push(`<span class="mini c-pend">ยังไม่ตรวจ ${s.pending}</span>`);
      badges=parts.join('');
    } else { badges=`<span class="mini c-pend">ยังไม่มีข้อมูล</span>`; }
    html += `<div class="farmcard" onclick="startInspect(${f.id})">
      <div style="min-width:0">
        <div class="nm">${f.name}</div>
        <div class="hint" style="margin-top:2px">${date}</div>
        <div class="badges">${badges}</div>
      </div>
      <div style="color:var(--hint);font-size:22px;flex:none">›</div>
    </div>`;
  });
  html += `<button class="btn primary" style="margin-top:6px" onclick="go('inspect')">เริ่มตรวจนับ</button>`;
  document.getElementById('view').innerHTML = html;
}

/* ---------- ตรวจนับ ---------- */
function startInspect(fid){ state.farmId=fid; state.draft=null; go('inspect'); }
function newDraft(){ const lines={}; ITEMS.forEach(it=>lines[it.id]={lots:[],touched:false,note:''}); return {lines}; }
function copyFromLast(){
  const li=latestForFarm(state.farmId);
  if(!li){ toast('ศูนย์นี้ยังไม่มีข้อมูลครั้งก่อน'); return; }
  ITEMS.forEach(it=>{ const prev=li.lines[it.id]; const d=state.draft.lines[it.id];
    if(prev && prev.touched){ d.lots=(prev.lots||[]).map(l=>({qty:l.qty,exp:l.exp})); d.touched=true; }
  });
  renderInspect(); toast('คัดลอกจำนวนจากครั้งก่อนแล้ว — ตรวจสอบและแก้ไขได้');
}
function renderInspect(){
  if(!state.draft) state.draft=newDraft();
  const farmOpts=FARMS.map(f=>`<option value="${f.id}" ${f.id===state.farmId?'selected':''}>${f.name}</option>`).join('');
  let html = `<div class="card">
    <label class="fld">ศูนย์ที่ตรวจ</label>
    <select onchange="state.farmId=parseInt(this.value)" style="margin-bottom:10px">${farmOpts}</select>
    <label class="fld">ผู้ตรวจ</label>
    <input id="inspName" placeholder="ชื่อผู้ตรวจ" value="${(state.inspector||'').replace(/"/g,'&quot;')}" oninput="state.inspector=this.value">
    <div class="row" style="margin-top:12px">
      <span class="hint">วันที่ตรวจ: ${beDate(new Date().toISOString())}</span>
      <button class="btn ghost sm" onclick="copyFromLast()">คัดลอกครั้งก่อน</button>
    </div>
    <div style="margin-top:12px">
      <div class="row"><span class="hint">ความคืบหน้า</span><span class="hint" id="progTxt">0 / ${ITEMS.length}</span></div>
      <div class="progress"><i id="progBar" style="width:0%"></i></div>
    </div>
  </div>`;
  CATS.forEach(cat=>{
    const its=ITEMS.filter(i=>i.cat===cat.id);
    html += `<div class="sec-h acc-toggle" onclick="toggleSec('${cat.id}')">
      <span>${cat.name} <span class="hint" style="font-weight:400">(${its.length})</span></span>
      <span class="hint" id="caret-${cat.id}">▾</span></div>`;
    html += `<div id="sec-${cat.id}">`;
    its.forEach(it=> html += itemCardHTML(it));
    html += `</div>`;
  });
  html += `<button class="btn primary" style="margin-top:14px" onclick="saveInspect()">บันทึกการตรวจ</button>
    <p class="hint" style="text-align:center;margin-top:10px">บันทึกแล้วจะดูย้อนหลังได้ในหน้า “ประวัติ”</p>`;
  document.getElementById('view').innerHTML = html;
  updateProgress();
}
function itemCardHTML(it){
  const line = state.draft.lines[it.id];
  const st = lineStatus(line,it); const sm=STATUS[st];
  const total = lineTotal(line);
  let body='';
  if(!line.touched){
    body = `<div class="row" style="margin-top:12px;gap:8px">
      <button class="addlot" style="flex:1" onclick="firstLot('${it.id}')">＋ ระบุจำนวน</button>
      <button class="nostock" onclick="markNone('${it.id}')">ไม่มีของ</button>
    </div>`;
  } else {
    let lots = (line.lots||[]).map((l,idx)=>`
      <div class="lot">
        <div class="stepper">
          <button onclick="chQty('${it.id}',${idx},-1)">−</button>
          <span class="qty" id="q-${it.id}-${idx}">${parseInt(l.qty)||0}</span>
          <button onclick="chQty('${it.id}',${idx},1)">＋</button>
        </div>
        ${it.exp? `<input type="month" value="${l.exp||''}" onchange="setExp('${it.id}',${idx},this.value)" aria-label="วันหมดอายุ">`
                : `<span class="hint" style="flex:1">ไม่มีวันหมดอายุ</span>`}
        <button class="rm" onclick="rmLot('${it.id}',${idx})" aria-label="ลบล็อต">✕</button>
      </div>`).join('');
    if(!(line.lots||[]).length) lots = `<div class="hint" style="margin-top:8px">บันทึกว่าไม่มีของ (จำนวน 0)</div>`;
    body = `${lots}
      <div class="row" style="margin-top:10px">
        <button class="addlot" onclick="addLot('${it.id}')">＋ เพิ่มล็อต</button>
        <span class="hint">รวม ${total} ${it.unit}</span>
      </div>`;
  }
  return `<div class="card" id="card-${it.id}">
    <div class="row" style="align-items:flex-start">
      <div style="min-width:0">
        <div class="item-name">${it.name}</div>
        <div class="meta">หน่วย: ${it.unit} · ขั้นต่ำ ${it.min}</div>
      </div>
      <span class="chip ${sm.c}" id="chip-${it.id}">${sm.l}</span>
    </div>
    ${body}
  </div>`;
}
function reRenderCard(id){ const it=ITEMS.find(x=>x.id===id);
  const el=document.getElementById('card-'+id); if(el){ el.outerHTML=itemCardHTML(it); } updateProgress(); }
function refreshChip(id){ const it=ITEMS.find(x=>x.id===id); const line=state.draft.lines[id];
  const st=lineStatus(line,it); const sm=STATUS[st]; const chip=document.getElementById('chip-'+id);
  if(chip){ chip.className='chip '+sm.c; chip.textContent=sm.l; } updateProgress(); }
function firstLot(id){ state.draft.lines[id]={lots:[{qty:1,exp:''}],touched:true,note:''}; reRenderCard(id); }
function markNone(id){ state.draft.lines[id]={lots:[],touched:true,note:''}; reRenderCard(id); }
function addLot(id){ state.draft.lines[id].lots.push({qty:1,exp:''}); state.draft.lines[id].touched=true; reRenderCard(id); }
function rmLot(id,idx){ state.draft.lines[id].lots.splice(idx,1); reRenderCard(id); }
function chQty(id,idx,d){ const lot=state.draft.lines[id].lots[idx]; lot.qty=Math.max(0,(parseInt(lot.qty)||0)+d);
  state.draft.lines[id].touched=true; const q=document.getElementById('q-'+id+'-'+idx); if(q) q.textContent=lot.qty; refreshChip(id); }
function setExp(id,idx,v){ state.draft.lines[id].lots[idx].exp=v; state.draft.lines[id].touched=true; refreshChip(id); }
function toggleSec(cid){ const s=document.getElementById('sec-'+cid); const c=document.getElementById('caret-'+cid);
  if(!s) return; const hide=s.style.display!=='none'; s.style.display=hide?'none':''; c.textContent=hide?'▸':'▾'; }
function updateProgress(){ let done=0; ITEMS.forEach(it=>{ if(state.draft.lines[it.id].touched) done++; });
  const pt=document.getElementById('progTxt'); const pb=document.getElementById('progBar');
  if(pt) pt.textContent=done+' / '+ITEMS.length; if(pb) pb.style.width=Math.round(done/ITEMS.length*100)+'%'; }
async function saveInspect(){
  const done = ITEMS.filter(it=>state.draft.lines[it.id].touched).length;
  if(done===0){ toast('ยังไม่ได้ตรวจรายการใดเลย'); return; }
  if(!(state.inspector||'').trim()){ toast('กรุณาระบุชื่อผู้ตรวจ'); return; }
  if(done<ITEMS.length && !confirm(`ตรวจแล้ว ${done}/${ITEMS.length} รายการ\nรายการที่เหลือจะถูกบันทึกเป็น “ยังไม่ตรวจ” — ยืนยันบันทึก?`)) return;
  const rec={ id:'i'+Date.now(), farmId:state.farmId, date:new Date().toISOString(), ts:Date.now(),
    inspector:state.inspector.trim(), lines: JSON.parse(JSON.stringify(state.draft.lines)) };
  INSPECTIONS.push(rec); await saveInspections();
  lastInspector=state.inspector.trim(); await storeSet('last_inspector', lastInspector);
  state.draft=null; toast('บันทึกการตรวจเรียบร้อย'); go('home');
  pushToSheet(rec);
}

function exportCSV(){
  const farms = state.reportFarm==='all'? FARMS : FARMS.filter(f=>f.id==state.reportFarm);

  farms.forEach(f=>{ const li=latestForFarm(f.id); if(!li) return;
    const catName=id=>{const c=CATS.find(x=>x.id===id);return c?c.name:''};
    ITEMS.forEach(it=>{ const line=li.lines[it.id]||{lots:[],touched:false}; const st=lineStatus(line,it);
      rows.push([f.name, beDate(li.date), li.inspector, catName(it.cat), it.name, it.unit, it.min,
        line.touched?lineTotal(line):'', it.exp?expLabel(nearestExp(line)):'-', STATUS[st].l]); }); });
  const csv = rows.map(r=>r.map(c=>{ c=String(c); return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c; }).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  const d=new Date(); a.href=url; a.download=`สต็อกเวชภัณฑ์_${d.getFullYear()+543}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.csv`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); toast('ดาวน์โหลดไฟล์ Excel แล้ว');
}

/* ---------- ตั้งค่า ---------- */
function renderSettings(){
  let html=`<button class="btn ghost sm" style="margin-bottom:12px" onclick="go('home')">‹ กลับ</button>
    <div class="card">
      <div style="font-weight:600">เชื่อมต่อ Google Sheet</div>
      <div class="hint" style="margin-top:4px">เมื่อใส่ลิงก์แล้ว ทุกครั้งที่บันทึกการตรวจ ระบบจะส่งข้อมูลเข้าชีตอัตโนมัติ</div>
      <label class="fld" style="margin-top:10px">Sheet ID</label>
      <input value="${SHEET_ID}" readonly style="background:var(--bg);color:var(--muted)">
      <label class="fld" style="margin-top:10px">ลิงก์ Web App (จาก Apps Script)</label>
      <input id="gsUrl" placeholder="https://script.google.com/macros/s/.../exec" value="${(gsheetUrl||'').replace(/"/g,'&quot;')}">
      <div class="row" style="margin-top:10px;gap:10px">
        <button class="btn primary sm" style="flex:1" onclick="saveGsUrl()">บันทึกลิงก์</button>
        <button class="btn ghost sm" style="flex:1" onclick="testGs()">ทดสอบส่ง</button>
      </div>
      <div class="hint" id="gsStat" style="margin-top:8px">${gsheetUrl?'สถานะ: เชื่อมต่อแล้ว':'สถานะ: ยังไม่เชื่อมต่อ'}</div>
    </div>
    <div class="card"><div style="font-weight:600">ตั้งจำนวนขั้นต่ำต่อรายการ</div>
    <div class="hint" style="margin-top:4px">ระบบจะเตือน “ต่ำกว่าเกณฑ์” เมื่อคงเหลือน้อยกว่าค่านี้</div></div>`;
  CATS.forEach(cat=>{ const its=ITEMS.filter(i=>i.cat===cat.id);
    html+=`<div class="sec-h">${cat.name}</div>`;
    its.forEach(it=>{ html+=`<div class="card" style="padding:11px 14px">
      <div class="row"><div class="item-name" style="font-size:14.5px;flex:1">${it.name}</div>
        <div class="stepper">
          <button onclick="chMin('${it.id}',-1)">−</button>
          <span class="qty" id="min-${it.id}">${it.min}</span>
          <button onclick="chMin('${it.id}',1)">＋</button>
        </div></div>
      <div class="meta">หน่วย: ${it.unit}</div></div>`; });
  });
  html+=`<button class="btn ghost" style="margin-top:14px;color:var(--bad)" onclick="resetMin()">คืนค่าขั้นต่ำเริ่มต้น</button>`;
  document.getElementById('view').innerHTML=html;
}
async function chMin(id,d){ const it=ITEMS.find(x=>x.id===id); it.min=Math.max(0,(it.min||0)+d);
  document.getElementById('min-'+id).textContent=it.min; await saveItems(); }
async function resetMin(){ if(!confirm('คืนค่าขั้นต่ำทุกรายการเป็นค่าเริ่มต้น?')) return;
  ITEMS.forEach(it=>{ const d=DEFAULT_ITEMS.find(x=>x.id===it.id); it.min=d.min; });
  await saveItems(); renderSettings(); toast('คืนค่าเรียบร้อย'); }

async function saveGsUrl(){ gsheetUrl=(document.getElementById('gsUrl').value||'').trim();
  await storeSet('gsheet_url', gsheetUrl);
  document.getElementById('gsStat').textContent = gsheetUrl?'สถานะ: เชื่อมต่อแล้ว':'สถานะ: ยังไม่เชื่อมต่อ';
  toast('บันทึกลิงก์แล้ว'); }
function gsRows(rec){ const catName=id=>{const c=CATS.find(x=>x.id===id);return c?c.name:''};
  return ITEMS.map(it=>{ const line=rec.lines[it.id]||{lots:[],touched:false}; const st=lineStatus(line,it);
    return {category:catName(it.cat), item:it.name, unit:it.unit, min:it.min,
      qty: line.touched?lineTotal(line):'', exp: it.exp?expLabel(nearestExp(line)):'-', status:STATUS[st].l}; }); }
async function pushToSheet(rec){ if(!gsheetUrl) return;
  const payload={ sheetId:SHEET_ID, farm:farmName(rec.farmId), date:beDate(rec.date),
    inspector:rec.inspector, ts:new Date(rec.ts).toISOString(), rows:gsRows(rec) };
  try{ await fetch(gsheetUrl,{method:'POST',mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload)});
    toast('ส่งข้อมูลเข้า Google Sheet แล้ว');
  }catch(e){ toast('ส่ง Google Sheet ไม่สำเร็จ — ตรวจลิงก์/สิทธิ์'); } }
async function testGs(){ const u=(document.getElementById('gsUrl').value||'').trim();
  if(!u){ toast('ใส่ลิงก์ Web App ก่อน'); return; }
  gsheetUrl=u; await storeSet('gsheet_url', u);
  const payload={ sheetId:SHEET_ID, farm:'(ทดสอบการเชื่อมต่อ)', date:beDate(new Date().toISOString()),
    inspector:'ระบบ', ts:new Date().toISOString(),
    rows:[{category:'-',item:'ทดสอบส่งข้อมูล',unit:'-',min:0,qty:0,exp:'-',status:'ทดสอบ'}] };
  try{ await fetch(u,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    toast('ส่งทดสอบแล้ว — เปิด Google Sheet เพื่อตรวจสอบแถวใหม่');
    document.getElementById('gsStat').textContent='สถานะ: เชื่อมต่อแล้ว';
  }catch(e){ toast('ส่งไม่สำเร็จ — เปิดไฟล์นอกแชต/ตรวจสิทธิ์ Web App'); } }

boot();
</script>
