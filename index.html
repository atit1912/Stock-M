async function fbGet(col, docId) {
  try {
    if(!window._fbReady) return null;

}

async function fbLoadAll() {
  try {
    if(!window._fbReady) { console.warn('[FB] not ready'); return false; }
    showSyncBar('กำลังโหลดข้อมูลจาก Cloud...');
    /* โหลด inspections */
    const snap = await window._fbDb.collection('inspections').get();
    if(!snap.empty) {
      const cloudInsps = [];
      snap.forEach(d => cloudInsps.push(d.data()));
      cloudInsps.sort((a,b) => a.ts - b.ts);
      INSPS = cloudInsps;
      await ss('insp_v3', JSON.stringify(INSPS));
    }
    /* โหลด orders */
    try{
      const ordSnap=await window._fbDb.collection('settings').doc('orders').get();
      if(ordSnap.exists&&ordSnap.data().data){
        const cloudOrds=JSON.parse(ordSnap.data().data);
        if(Array.isArray(cloudOrds)){ORDERS=cloudOrds;await ss('orders_v1',JSON.stringify(ORDERS));}
      }
    }catch(e){console.warn('fbOrders load:',e.message);}
    /* โหลด item_photos */
    try{
      const phSnap=await window._fbDb.collection('settings').doc('item_photos').get();
      if(phSnap.exists&&phSnap.data().data){
        const cloudPh=JSON.parse(phSnap.data().data);
        if(cloudPh&&typeof cloudPh==='object'){ITEM_PHOTOS=cloudPh;await ss('item_photos_v1',JSON.stringify(ITEM_PHOTOS));}
      }
    }catch(e){console.warn('fbPhotos load:',e.message);}
    /* โหลด farm_cfg */
    const cfgSnap = await window._fbDb.collection('settings').doc('farm_cfg').get();
    if(cfgSnap.exists) {
      const cfg = cfgSnap.data().value;
      if(cfg) {
        FARM_CFG = cfg;
        /* sync รายการใหม่จาก STD_ITEMS เข้าไป (Firestore อาจมีรายการเก่า) */
        FARMS.forEach(f=>{
          if(!FARM_CFG[f.id]){FARM_CFG[f.id]={items:STD_ITEMS.map(x=>({...x})),resp:'',inspector:INSPECTORS[0]};return;}
          if(!FARM_CFG[f.id].items)FARM_CFG[f.id].items=[];
          const existIds=new Set(FARM_CFG[f.id].items.map(x=>x.id));
          STD_ITEMS.forEach(si=>{if(!existIds.has(si.id))FARM_CFG[f.id].items.push({...si});});
        });
        await ss('farm_cfg_v3', JSON.stringify(FARM_CFG));
        /* เขียนกลับ Firestore ให้รายการครบ 33 */
        try{await window._fbDb.collection('settings').doc('farm_cfg').set({value:FARM_CFG});}catch(e){}
      }
    }
    hideSyncBar();
    return true;
  } catch(e) {
    console.warn('fbLoadAll:', e.message);
    hideSyncBar();
    return false;
  }
}

async function boot(){
  /* 1. โหลดจาก localStorage ก่อน (เร็ว ไม่รอ network) */
  /* โหลด INSPECTORS จาก settings */
  const inspList=await sg('inspectors_v1');
  if(inspList){try{const arr=JSON.parse(inspList);if(arr&&arr.length)INSPECTORS=arr;}catch(e){}}
  const ci=await sg('farm_cfg_v3');
  if(ci){try{FARM_CFG=JSON.parse(ci)||{}}catch(e){FARM_CFG={}}}
  FARMS.forEach(f=>{
    if(!FARM_CFG[f.id]){
      FARM_CFG[f.id]={items:STD_ITEMS.map(x=>({...x})),resp:'',inspector:INSPECTORS[0]};
    }
  });
  for(const f of FARMS){
    if(!FARM_CFG[f.id]._fiMigrated){
      const oldItems=await sg('fi_'+f.id);
      if(oldItems){try{const parsed=JSON.parse(oldItems);if(Array.isArray(parsed)&&parsed.length)FARM_CFG[f.id].items=parsed}catch(e){}}
      const oldResp=await sg('resp_'+f.id);
      if(oldResp&&!FARM_CFG[f.id].resp)FARM_CFG[f.id].resp=oldResp;
      FARM_CFG[f.id]._fiMigrated=true;
    }
    // sync รายการใหม่จาก STD_ITEMS เสมอ (ทั้ง migrated และยังไม่ migrate)
    const existIds=new Set(FARM_CFG[f.id].items.map(x=>x.id));
    STD_ITEMS.forEach(si=>{if(!existIds.has(si.id))FARM_CFG[f.id].items.push({...si});});
  }
  const ins=await sg('insp_v3');
  if(ins){try{INSPS=JSON.parse(ins)||[]}catch(e){INSPS=[]}}
  const ord=await sg('orders_v1');
  if(ord){try{ORDERS=JSON.parse(ord)||[]}catch(e){ORDERS=[]}}
  const ph=await sg('item_photos_v1');
  if(ph){try{ITEM_PHOTOS=JSON.parse(ph)||{}}catch(e){ITEM_PHOTOS={}}}
  gsUrl=(await sg('gsheet_url'))||GSD;
  const n=new Date();S.rym=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');

  /* 2. แสดง UI จาก local data ก่อน */
  window._appReady=true;
  window.INSPS=INSPS;
  window.FARM_CFG=FARM_CFG;
  window._refreshUI=function(){
    INSPS=window.INSPS;
    FARM_CFG=window.FARM_CFG;
    const v=S.view;
    if(v==='home')rHome();
    else if(v==='alerts')rAlerts();
    else if(v==='farm')rFarm();
    else if(v==='farm-report')rRep();
    updBadges();
    showSyncOK();
  };
  go('home');

  /* 3. โหลด Firebase ใน background (ไม่บล็อก UI) */
  setTimeout(async()=>{
    const ok=await fbLoadAll();
    if(ok){
      window.INSPS=INSPS;
      window.FARM_CFG=FARM_CFG;
      go(S.view,{fid:S.fid});
      /* เริ่ม real-time listeners */
      window._fbStartListeners && window._fbStartListeners();
    }
  },500);
}

/* ── HELPERS ── */
function F(id){return FARMS.find(x=>x.id===id)||FARMS[0]}
function FC(fid){return FARM_CFG[fid]||(FARM_CFG[fid]={items:STD_ITEMS.map(x=>({...x})),resp:'',inspector:INSPECTORS[0]}),FARM_CFG[fid]}
function fItems(fid){return FC(fid).items.filter(x=>!x.hidden)}
function CN(id){const c=CATS.find(x=>x.id===id);return c?c.name:''}
function beD(iso){const d=new Date(iso);const M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];return d.getDate()+' '+M[d.getMonth()]+' '+(d.getFullYear()+543)}
function thM(ym){if(!ym)return'';const[y,m]=ym.split('-');const M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];return M[parseInt(m)-1]+' '+(parseInt(y)+543)}
function xL(exp){
  if(!exp)return'—';
  const p=exp.split('-');
  if(p.length===3){
    const d=new Date(exp);
    const M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    return d.getDate()+' '+M[d.getMonth()]+' '+(d.getFullYear()+543);
  }
  return p[1]+'/'+(parseInt(p[0])+543); /* YYYY-MM → MM/BBBB */
}
function nowYM(){const n=new Date();return n.getFullYear()*12+n.getMonth()}
function daysTo(exp){
  if(!exp)return null;
  let d;
  const parts=exp.split('-');
  if(parts.length===3){d=new Date(exp);}  /* YYYY-MM-DD */
  else{const[y,m]=parts.map(Number);d=new Date(y,m,0);}  /* YYYY-MM → สิ้นเดือน */
  return Math.round((d.getTime()-Date.now())/86400000);
}
function daysSince(iso){return Math.floor((Date.now()-new Date(iso))/86400000)}
function lt(line){return(line.lots||[]).reduce((s,l)=>s+(parseInt(l.qty)||0),0)}
function nx(line){return(line.lots||[]).filter(l=>l.exp).map(l=>l.exp).sort()[0]||''}
function ls(line,item){
  if(!line||!line.touched)return'pending';
  const t=lt(line);if(t===0)return'out';
  let ex=false,nr=false;
  (line.lots||[]).forEach(l=>{
    if(l.exp){
      const days=daysTo(l.exp);
      if(days!==null&&days<0)ex=true;
      else if(days!==null&&days<=NEAR_DAYS)nr=true;
    }
  });
  if(ex)return'expired';if(t<(item.min||0))return'below';if(nr)return'near';return'ok';
}
function summ(insp,fid){
  const its=fItems(fid);
  const c={ok:0,near:0,below:0,expired:0,out:0,pending:0};
  its.forEach(it=>{const l=(insp.lines||{})[it.id]||{lots:[],touched:false};c[ls(l,it)]++;});
  return c;
}
function latF(fid){return INSPS.filter(i=>i.farmId===fid).sort((a,b)=>b.ts-a.ts)[0]||null}
function latFM(fid,ym){return INSPS.filter(i=>i.farmId===fid&&i.date.startsWith(ym)).sort((a,b)=>b.ts-a.ts)[0]||null}
function allKPI(){const c={ok:0,near:0,below:0,expired:0,out:0,pending:0};FARMS.forEach(f=>{const li=latF(f.id);if(li){const s=summ(li,f.id);for(const k in c)c[k]+=s[k];}});return c}
function buildAlerts(){
  const A=[];
  FARMS.forEach(f=>{const li=latF(f.id);
    if(!li){A.push({sev:2,fid:f.id,farm:f.name,fc:f.c,title:'ยังไม่เคยตรวจ',desc:'ศูนย์นี้ยังไม่มีข้อมูล',sub:'ยังไม่ตรวจ',col:'var(--near)',ic:'🕒'});return;}
    const ds=daysSince(li.date);
    if(ds>=STALE)A.push({sev:2,fid:f.id,farm:f.name,fc:f.c,title:f.sh,desc:'ไม่ได้ตรวจมา '+ds+' วัน',sub:'ค้างตรวจ',col:'var(--near)',ic:'🕒'});
    fItems(f.id).forEach(it=>{const line=(li.lines||{})[it.id]||{lots:[],touched:false};const stk=ls(line,it);
      if(stk==='expired')A.push({sev:0,fid:f.id,farm:f.name,fc:f.c,title:it.name,desc:'หมดอายุแล้ว ('+xL(nx(line))+')',sub:'หมดอายุ',col:'var(--bad)',ic:'⛔'});
      else if(stk==='out')A.push({sev:0,fid:f.id,farm:f.name,fc:f.c,title:it.name,desc:'ไม่มีของในคลัง',sub:'หมด',col:'var(--bad)',ic:'⛔'});
      else if(stk==='near'){const d=daysTo(nx(line));A.push({sev:1,fid:f.id,farm:f.name,fc:f.c,title:it.name,desc:'ใกล้หมดอายุ'+(d!=null?' ใน '+d+' วัน':''),sub:'ใกล้หมดอายุ',col:'var(--near)',ic:'⏰'});}
      else if(stk==='below')A.push({sev:1,fid:f.id,farm:f.name,fc:f.c,title:it.name,desc:'ต่ำกว่าเกณฑ์ (เหลือ '+lt(line)+' '+it.unit+')',sub:'ต่ำกว่าเกณฑ์',col:'var(--below)',ic:'🔻'});
    });
  });
  A.sort((a,b)=>a.sev-b.sev);return A;
}

/* ── MONTHLY DASHBOARD ── */
function rDash(){
  rsTh();
  // สร้าง 6 เดือนย้อนหลัง
  const months=[];
  const now=new Date();
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const ym=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const label=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][d.getMonth()];
    months.push({ym,label:label+' '+(d.getFullYear()+543-2500)});
  }

  // KPI trend รวมทุกฟาร์ม
  const totalTrend=months.map(({ym})=>{
    let ok=0,warn=0,bad=0,checked=0;
    FARMS.forEach(f=>{
      const li=latFM(f.id,ym);
      if(li){checked++;const sv=summ(li,f.id);ok+=sv.ok;warn+=sv.near+sv.below;bad+=sv.expired+sv.out;}
    });
    return {ok,warn,bad,checked};
  });

  // per-farm trend
  const farmTrend=FARMS.map(f=>({
    farm:f,
    months:months.map(({ym})=>{
      const li=latFM(f.id,ym);
      if(!li)return null;
      return summ(li,f.id);
    })
  }));

  // ── SVG bar chart helper ──
  function barChart(data,colors,labels,height=90){
    const W=320,H=height,PL=0,PR=4,PT=10,PB=22;
    const cW=W-PL-PR,cH=H-PT-PB;
    const n=data[0].length;
    const bGap=4,bW=Math.floor((cW/n)-bGap);
    const maxVal=Math.max(...data.flat().filter(v=>v!=null),1);
    let svg=`<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">`;
    // grid lines
    [0.5,1].forEach(f=>{
      const y=PT+cH*(1-f);
      svg+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="var(--line)" stroke-width="1" stroke-dasharray="3,3"/>`;
      svg+=`<text x="${PL}" y="${y-3}" font-size="9" fill="var(--hint)" font-family="Sarabun,sans-serif">${Math.round(maxVal*f)}</text>`;
    });
    // bars
    data.forEach((series,si)=>{
      series.forEach((val,i)=>{
        if(val==null)return;
        const stackOffset=data.slice(0,si).reduce((acc,s)=>acc+(s[i]||0),0);
        const x=PL+i*(bW+bGap)+(si===0?0:0);
        const barH=Math.max((val/maxVal)*cH,val>0?2:0);
        const y=PT+cH-(stackOffset/maxVal)*cH-barH;
        svg+=`<rect x="${x}" y="${y}" width="${bW}" height="${barH}" fill="${colors[si]}" rx="2"/>`;
      });
    });
    // x labels
    labels.forEach((lb,i)=>{
      const x=PL+i*(bW+bGap)+bW/2;
      svg+=`<text x="${x}" y="${H-4}" text-anchor="middle" font-size="9" fill="var(--mut)" font-family="Sarabun,sans-serif">${lb}</text>`;
    });
    svg+='</svg>';
    return svg;
  }

  // ── line chart helper ──
  function lineChart(series,colors,labels,height=80){
    const W=320,H=height,PL=8,PR=4,PT=10,PB=20;
    const cW=W-PL-PR,cH=H-PT-PB;
    const n=labels.length;
    const allVals=series.flat().filter(v=>v!=null);
    const maxVal=Math.max(...allVals,1);
    let svg=`<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">`;
    // grid
    const y0=PT+cH;
    svg+=`<line x1="${PL}" y1="${y0}" x2="${W-PR}" y2="${y0}" stroke="var(--line)" stroke-width="1"/>`;
    // lines
    series.forEach((data,si)=>{
      const pts=data.map((v,i)=>{
        if(v==null)return null;
        const x=PL+i*(cW/(n-1));
        const y=PT+cH*(1-v/maxVal);
        return [x,y];
      });
      // line
      let d='';
      pts.forEach((p,i)=>{
        if(!p)return;
        d+=(d?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1);
      });
      if(d)svg+=`<path d="${d}" fill="none" stroke="${colors[si]}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
      // dots
      pts.forEach(p=>{
        if(!p)return;
        svg+=`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="${colors[si]}" stroke="var(--card)" stroke-width="1.5"/>`;
      });
    });
    // x labels
    labels.forEach((lb,i)=>{
      const x=PL+i*(cW/(n-1));
      svg+=`<text x="${x}" y="${H-3}" text-anchor="middle" font-size="9" fill="var(--mut)" font-family="Sarabun,sans-serif">${lb}</text>`;
    });
    svg+='</svg>';
    return svg;
  }

  const lbs=months.map(m=>m.label);

  // ── Section 1: ภาพรวม KPI trend ──
  const okSeries=totalTrend.map(t=>t.ok);
  const warnSeries=totalTrend.map(t=>t.warn);
  const badSeries=totalTrend.map(t=>t.bad);
  const checkedSeries=totalTrend.map(t=>t.checked);

  let h='';

  // summary cards แถวบน
  const lastMonth=totalTrend[5];
  const prevMonth=totalTrend[4];
  function trendArrow(cur,prev){
    if(prev==null||prev===0)return '';
    return cur>prev?'<span style="color:var(--bad)"> ↑</span>':cur<prev?'<span style="color:var(--ok)"> ↓</span>':'<span style="color:var(--hint)"> →</span>';
  }

  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
    <div style="background:var(--ok-bg);border:1px solid var(--ok-bd);border-radius:10px;padding:10px 12px">
      <div style="font-size:10px;color:var(--ok);margin-bottom:2px">ปกติ (เดือนล่าสุด)</div>
      <div style="font-size:22px;font-weight:800;color:var(--ok);line-height:1">${lastMonth.ok}${trendArrow(lastMonth.ok,prevMonth.ok)}</div>
      <div style="font-size:10px;color:var(--mut);margin-top:3px">เดือนก่อน ${prevMonth.ok}</div>
    </div>
    <div style="background:var(--bad-bg);border:1px solid var(--bad-bd);border-radius:10px;padding:10px 12px">
      <div style="font-size:10px;color:var(--bad);margin-bottom:2px">หมด/หมดอายุ (เดือนล่าสุด)</div>
      <div style="font-size:22px;font-weight:800;color:var(--bad);line-height:1">${lastMonth.bad}${trendArrow(lastMonth.bad,prevMonth.bad)}</div>
      <div style="font-size:10px;color:var(--mut);margin-top:3px">เดือนก่อน ${prevMonth.bad}</div>
    </div>
    <div style="background:var(--near-bg);border:1px solid var(--near-bd);border-radius:10px;padding:10px 12px">
      <div style="font-size:10px;color:var(--near);margin-bottom:2px">ใกล้หมด/ต่ำเกณฑ์</div>
      <div style="font-size:22px;font-weight:800;color:var(--near);line-height:1">${lastMonth.warn}${trendArrow(lastMonth.warn,prevMonth.warn)}</div>
      <div style="font-size:10px;color:var(--mut);margin-top:3px">เดือนก่อน ${prevMonth.warn}</div>
    </div>
    <div style="background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:10px 12px">
      <div style="font-size:10px;color:var(--mut);margin-bottom:2px">ศูนย์ที่ตรวจแล้ว</div>
      <div style="font-size:22px;font-weight:800;color:var(--ink);line-height:1">${lastMonth.checked}<span style="font-size:13px;font-weight:400;color:var(--mut)">/${FARMS.length}</span></div>
      <div style="font-size:10px;color:var(--mut);margin-top:3px">เดือนก่อน ${prevMonth.checked}/${FARMS.length}</div>
    </div>
  </div>`;

  // stacked bar chart - จำนวนรายการแต่ละสถานะ
  h+=`<div class="card" style="margin-bottom:12px;padding:12px 14px">
    <div style="font-size:11.5px;font-weight:700;color:var(--mut);margin-bottom:10px">📊 สถานะรายการยา รวมทุกศูนย์ (6 เดือน)</div>
    ${barChart([okSeries,warnSeries,badSeries],['var(--ok)','var(--near)','var(--bad)'],lbs,100)}
    <div style="display:flex;gap:10px;margin-top:6px;flex-wrap:wrap">
      <span style="font-size:10px;color:var(--ok)">■ ปกติ</span>
      <span style="font-size:10px;color:var(--near)">■ ใกล้หมด/ต่ำเกณฑ์</span>
      <span style="font-size:10px;color:var(--bad)">■ หมด/หมดอายุ</span>
    </div>
  </div>`;

  // line chart - จำนวนศูนย์ที่ตรวจ
  h+=`<div class="card" style="margin-bottom:12px;padding:12px 14px">
    <div style="font-size:11.5px;font-weight:700;color:var(--mut);margin-bottom:10px">✅ จำนวนศูนย์ที่ตรวจนับ (6 เดือน)</div>
    ${lineChart([checkedSeries],['var(--ok)'],lbs,80)}
  </div>`;

  // ── Section 2: per-farm trend ──
  h+=`<div style="font-size:11.5px;font-weight:700;color:var(--mut);margin-bottom:8px;margin-top:4px">รายละเอียดแต่ละศูนย์</div>`;

  farmTrend.forEach(({farm,months:mData})=>{
    const hasData=mData.some(m=>m!=null);
    const okD=mData.map(m=>m?m.ok:null);
    const warnD=mData.map(m=>m?m.near+m.below:null);
    const badD=mData.map(m=>m?m.expired+m.out:null);
    const lastD=mData[5];
    const status=!hasData?'<span style="color:var(--pend)">ไม่มีข้อมูล</span>'
      :!lastD?'<span style="color:var(--hint)">ยังไม่ได้ตรวจเดือนนี้</span>'
      :(lastD.expired+lastD.out)>0?`<span style="color:var(--bad)">หมด/หมดอายุ ${lastD.expired+lastD.out}</span>`
      :(lastD.near+lastD.below)>0?`<span style="color:var(--near)">เตือน ${lastD.near+lastD.below}</span>`
      :`<span style="color:var(--ok)">ปกติ ✓</span>`;

    h+=`<div class="card" style="margin-bottom:10px;padding:12px 14px;border-left:4px solid ${farm.c}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-size:13px;font-weight:700">${farm.name}</div>
        <div style="font-size:11px">${status}</div>
      </div>`;

    if(hasData){
      h+=lineChart([okD,warnD,badD],['var(--ok)','var(--near)','var(--bad)'],lbs,80);
      // mini summary ล่าสุด
      if(lastD){
        h+=`<div style="display:flex;gap:8px;margin-top:8px;font-size:10px">
          <span style="color:var(--ok)">ปกติ ${lastD.ok}</span>
          <span style="color:var(--near)">ใกล้หมด ${lastD.near}</span>
          <span style="color:var(--below)">ต่ำเกณฑ์ ${lastD.below}</span>
          <span style="color:var(--bad)">หมด ${lastD.expired+lastD.out}</span>
        </div>`;
      }
    }else{
      h+=`<div style="text-align:center;padding:16px 0;color:var(--hint);font-size:12px">ยังไม่มีข้อมูลการตรวจ</div>`;
    }
    h+='</div>';
  });

  h+=cred();
  document.getElementById('scr').innerHTML=h;
}


/* ── STREAK HELPERS ── */
function calcStreak(fid){
  // นับ consecutive months ที่มีการตรวจ (ย้อนจากเดือนปัจจุบัน)
  const now=new Date();
  let streak=0;
  // ถ้าเดือนปัจจุบันยังไม่ตรวจ ให้เริ่มนับจากเดือนก่อนหน้า (ยังไม่ถือว่าขาด)
  const curYm=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const startI=latFM(fid,curYm)?0:1;
  for(let i=startI;i<12+startI;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const ym=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    if(latFM(fid,ym))streak++;
    else break;
  }
  // จำนวนครั้งที่ตรวจใน 6 เดือน
  let count6=0;
  for(let i=0;i<6;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const ym=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    if(latFM(fid,ym))count6++;
  }
  const last=latF(fid);
  const daysSinceLast=last?daysSince(last.date):null;
  return{streak,count6,daysSinceLast};
}
function streakLabel(st){
  const{streak,count6,daysSinceLast}=st;
  if(daysSinceLast===null)return{text:'ยังไม่เคยตรวจ',color:'var(--pend)',icon:'○'};
  if(streak>=3)return{text:'ต่อเนื่อง '+streak+' เดือน',color:'var(--ok)',icon:'🔥'};
  if(streak>=1)return{text:'ตรวจ '+count6+'/6 เดือน',color:'var(--near)',icon:'📅'};
  if(daysSinceLast>STALE)return{text:'ขาด '+daysSinceLast+' วัน',color:'var(--bad)',icon:'⚠'};
  return{text:'ตรวจ '+count6+'/6 เดือน',color:'var(--hint)',icon:'📅'};
}

/* ── ITEM PHOTOS ── */
// resize รูปเป็น 120x120 + compress → base64
function resizeImage(file,cb){
  const img=new Image();
  img.onload=()=>{
    const MAX=240;  // ขนาดด้านยาวสุด
    // คงสัดส่วนเดิม fit ในกรอบ MAX (ไม่ crop เห็นเต็มทั้งใบ)
    let w=img.width, h=img.height;
    if(w>h){ if(w>MAX){h=Math.round(h*MAX/w);w=MAX;} }
    else { if(h>MAX){w=Math.round(w*MAX/h);h=MAX;} }
    const canvas=document.createElement('canvas');
    canvas.width=w;canvas.height=h;
    const ctx=canvas.getContext('2d');
    // พื้นหลังขาว (กันรูป PNG โปร่งใส)
    ctx.fillStyle='#ffffff';ctx.fillRect(0,0,w,h);
    ctx.drawImage(img,0,0,w,h);
    cb(canvas.toDataURL('image/jpeg',0.78));
  };
  img.onerror=()=>{toast('โหลดรูปไม่สำเร็จ');cb(null);};
  img.src=URL.createObjectURL(file);
}
// หา รูปของรายการ: farm override ก่อน → shared → null
function getItemPhoto(itemId,fid){
  const p=ITEM_PHOTOS[itemId];
  if(!p)return null;
  if(fid&&p.farms&&p.farms[fid])return p.farms[fid];
  return p.shared||null;
}
async function saveItemPhotos(){
  await ss('item_photos_v1',JSON.stringify(ITEM_PHOTOS));
  if(window._fbReady){
    try{await window._fbDb.collection('settings').doc('item_photos').set({data:JSON.stringify(ITEM_PHOTOS)});}
    catch(e){console.warn('fbPhotos:',e.message);}
  }
}
// set รูป: scope='shared' หรือ fid (number)
function setItemPhoto(itemId,base64,scope){
  if(!ITEM_PHOTOS[itemId])ITEM_PHOTOS[itemId]={shared:null,farms:{}};
  if(scope==='shared')ITEM_PHOTOS[itemId].shared=base64;
  else{if(!ITEM_PHOTOS[itemId].farms)ITEM_PHOTOS[itemId].farms={};ITEM_PHOTOS[itemId].farms[scope]=base64;}
  saveItemPhotos();
}
function removeItemPhoto(itemId,scope){
  const p=ITEM_PHOTOS[itemId];if(!p)return;
  if(scope==='shared')p.shared=null;
  else if(p.farms)delete p.farms[scope];
  saveItemPhotos();
}

// trigger เลือกรูป
function pickItemPhoto(itemId,scope){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    toast('กำลังประมวลผลรูป...');
    resizeImage(file,b64=>{
      if(!b64)return;
      setItemPhoto(itemId,b64,scope);
      toast('บันทึกรูปแล้ว ✓');
      if(S.view==='farm-settings')rFSett();
      else if(S.view==='inspect')rInsp();
    });
  };
  inp.click();
}

    +(warnFarms?'<span style="font-size:10.5px;font-weight:700;color:var(--near);background:var(--near-bg);border:1px solid var(--near-bd);border-radius:99px;padding:2px 9px">⚠ '+warnFarms+' ศูนย์มีรายการแจ้งเตือน</span>':'')
    +((!warnFarms&&noCheckFarms)?'<span style="font-size:10.5px;color:var(--pend)">'+noCheckFarms+' ศูนย์ยังไม่ตรวจ</span>':'')
    +'</div>';

    const li=latF(f.id);const sv=li?summ(li,f.id):null;
    const warn=sv?sv.near+sv.below+sv.expired+sv.out:0;

    const bBg=!sv?'var(--pend-bg)':warn?'var(--near-bg)':'var(--ok-bg)';
    const bTxt=!sv?'ยังไม่ตรวจ':warn?'เตือน '+warn:'ตรวจแล้ว';
    const lDate=li?beD(li.date):'';
    const st=calcStreak(f.id);const sl=streakLabel(st);

    const dots=sv?[
      sv.near   ?`<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--near);background:var(--near-bg);border:1px solid var(--near-bd);border-radius:99px;padding:1px 7px">⚠ ${sv.near} ใกล้หมด</span>`:'',
      sv.below  ?`<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--below);background:var(--below-bg);border:1px solid var(--below-bd);border-radius:99px;padding:1px 7px">↓ ${sv.below} ต่ำกว่าเกณฑ์</span>`:'',

    ].filter(Boolean).join(' '):'';
    const pendOrds=ORDERS.filter(o=>o.farmId===f.id&&o.status!=='received').length;
    const ordDot=pendOrds?`<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--fc);background:var(--fb);border:1px solid var(--fc)55;border-radius:99px;padding:1px 7px">📋 ${pendOrds} รายการสั่งของ</span>`:'';
    const allDots=(dots+(dots&&ordDot?' ':'')+ordDot);
    h+='<div style="position:relative;background:var(--card);border:1px solid var(--line);border-left:5px solid '+f.c+';border-radius:10px;padding:10px 13px;margin-bottom:8px;cursor:pointer" onclick="go(\'farm\',{fid:'+f.id+'})">'

      +(allDots?'<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:5px">'+allDots+'</div>':'')
      +'</div>'

      +'<span style="color:var(--hint)">›</span>'
      +'</div></div></div>';
  });

  h+=cred();
  document.getElementById('scr').innerHTML=h;
}

function csvX(li,its){
  if(typeof XLSX==='undefined'){toast('กำลังโหลด SheetJS...');return;}
  const f=F(S.fid);
  const wb=XLSX.utils.book_new();
  const rows=[
    ['รายงานตรวจนับสต็อกยาและเวชภัณฑ์ – '+f.name,'','','','','','','',''],
    ['วันที่ตรวจ: '+beD(li.date),'','ผู้ตรวจ: '+li.inspector,'','','','','',''],
    [],
    ['รายการ','หมวด','หน่วย','ขั้นต่ำ','คงเหลือ','ล็อต/หมดอายุ','ต้องสั่งเพิ่ม','สถานะ','หมายเหตุ'],
  ];
  CATS.forEach(cat=>{
    its.filter(i=>i.cat===cat.id).forEach(it=>{
      const line=(li.lines||{})[it.id]||{lots:[],touched:false};
      const stk=ls(line,it);
      const qty=line.touched?lt(line):0;
      const need=Math.max(0,(it.min||0)-qty);
      const lotStr=(line.lots||[]).filter(l=>l.exp).map(l=>l.qty+it.unit+' ('+xL(l.exp)+')').join(', ')||'—';
      const note=FC(S.fid).items.find(x=>x.id===it.id)?.note||'';
      rows.push([it.name,CN(it.cat),it.unit,it.min,line.touched?qty:'—',lotStr,need||'—',SM[stk].l,note]);
    });
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:30},{wch:18},{wch:8},{wch:8},{wch:8},{wch:28},{wch:12},{wch:12},{wch:22}];
  /* style หัวตาราง */
  XLSX.utils.book_append_sheet(wb,'รายการตรวจนับ',ws);
  const d=new Date();
  XLSX.writeFile(wb,'MediTrack_'+f.sh+'_'+(d.getFullYear()+543)+String(d.getMonth()+1).padStart(2,'0')+'.xlsx');
  toast('ดาวน์โหลด .xlsx แล้ว ✓');
}

/* ── HISTORY ── */
function rHist(tab){
  tab=tab||'list';
  const f=F(S.fid);
  const list=INSPS.filter(i=>i.farmId===S.fid).sort((a,b)=>b.ts-a.ts);

  // tabs
  const tabs=`<div class="seg" style="margin-bottom:12px">
    <button class="${tab==='list'?'on':''}" onclick="rHist('list')">📋 รายการ (${list.length})</button>
    <button class="${tab==='monthly'?'on':''}" onclick="rHist('monthly')">📊 รายเดือน</button>
  </div>`;

  if(!list.length){
    document.getElementById('scr').innerHTML=tabs+'<div class="empty">ยังไม่มีประวัติ</div>'+cred();return;
  }

  if(tab==='list'){
    // ── รายการเดิม ──
    document.getElementById('scr').innerHTML=tabs+
      list.map(insp=>{
        const sv=summ(insp,S.fid);const prob=sv.expired+sv.out+sv.below+sv.near;
        return`<div class="irow" style="cursor:pointer" onclick="S.did='${insp.id}';rHD()">
          <div>
            <div style="font-size:14.5px;font-weight:700">${beD(insp.date)}</div>
            <div style="font-size:12px;color:var(--hint);margin-top:2px">ผู้ตรวจ: ${insp.inspector}</div>
          </div>
          <span class="chip ${prob?'c-bad':'c-ok'}">${prob?prob+' รายการ':'ครบถ้วน'}</span>
        </div>`;
      }).join('')+cred();
    return;
  }

  // ── รายเดือน ──
  // สร้าง 12 เดือนย้อนหลัง
  const now=new Date();
  const months=[];
  for(let i=11;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const ym=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    const label=M[d.getMonth()]+' '+(d.getFullYear()+543-2500);
    const insp=latFM(S.fid,ym);
    months.push({ym,label,insp});
  }

  // SVG mini line chart (ok/warn/bad)
  const hasData=months.some(m=>m.insp);
  let chartHtml='';
  if(hasData){
    const W=300,H=70,PL=6,PR=6,PT=8,PB=16;
    const cW=W-PL-PR,cH=H-PT-PB;
    const n=months.length;
    const okD=months.map(m=>m.insp?summ(m.insp,S.fid).ok:null);
    const warnD=months.map(m=>m.insp?summ(m.insp,S.fid).near+summ(m.insp,S.fid).below:null);
    const badD=months.map(m=>m.insp?summ(m.insp,S.fid).expired+summ(m.insp,S.fid).out:null);
    const allVals=[...okD,...warnD,...badD].filter(v=>v!=null);
    const maxV=Math.max(...allVals,1);

    function mkLine(data,color){
      const pts=data.map((v,i)=>{
        if(v==null)return null;
        return[PL+i*(cW/(n-1)),PT+cH*(1-v/maxV)];
      });
      let d='';
      pts.forEach(p=>{if(!p)return;d+=(d?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1);});
      let dots='';
      pts.forEach((p,i)=>{if(!p)return;dots+=`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.5" fill="${color}" stroke="var(--card)" stroke-width="1.2"/>`;});
      return(d?`<path d="${d}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>`:'')+''+dots;
    }
    // x labels ทุก 3 เดือน
    let xlbls='';
    months.forEach((m,i)=>{
      if(i%3!==0&&i!==n-1)return;
      xlbls+=`<text x="${(PL+i*(cW/(n-1))).toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="8" fill="var(--hint)" font-family="Sarabun,sans-serif">${m.label.split(' ')[0]}</text>`;
    });
    chartHtml=`<div class="card" style="padding:12px 14px;margin-bottom:12px">
      <div style="font-size:11.5px;font-weight:700;color:var(--mut);margin-bottom:8px">สถานะรายการยา (12 เดือน)</div>
      <svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">
        <line x1="${PL}" y1="${PT+cH}" x2="${W-PR}" y2="${PT+cH}" stroke="var(--line)" stroke-width="1"/>
        ${mkLine(okD,'var(--ok)')}
        ${mkLine(warnD,'var(--near)')}
        ${mkLine(badD,'var(--bad)')}
        ${xlbls}
      </svg>
      <div style="display:flex;gap:10px;margin-top:4px">
        <span style="font-size:10px;color:var(--ok)">■ ปกติ</span>
        <span style="font-size:10px;color:var(--near)">■ ใกล้หมด/ต่ำเกณฑ์</span>
        <span style="font-size:10px;color:var(--bad)">■ หมด/หมดอายุ</span>
      </div>
    </div>`;
  }

  // รายการรายเดือน
  let monthRows='';
  months.slice().reverse().forEach(({label,insp,ym})=>{
    if(!insp){
      monthRows+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line)">
        <div><div style="font-size:13px;font-weight:700;color:var(--hint)">${label}</div></div>
        <span style="font-size:11px;color:var(--hint)">ไม่มีข้อมูล</span>
      </div>`;
      return;
    }
    const sv=summ(insp,S.fid);
    const prob=sv.expired+sv.out+sv.below+sv.near;
    monthRows+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer" onclick="S.did='${insp.id}';rHD()">
      <div>
        <div style="font-size:13px;font-weight:700">${label}</div>
        <div style="font-size:11px;color:var(--hint);margin-top:2px">
          ผู้ตรวจ: ${insp.inspector} · ${beD(insp.date)}
        </div>
        <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap">
          <span style="font-size:10px;color:var(--ok)">✓ ปกติ ${sv.ok}</span>
          ${sv.near?`<span style="font-size:10px;color:var(--near)">⚠ ใกล้หมด ${sv.near}</span>`:''}
          ${sv.below?`<span style="font-size:10px;color:var(--below)">↓ ต่ำ ${sv.below}</span>`:''}
          ${(sv.expired+sv.out)?`<span style="font-size:10px;color:var(--bad)">✕ หมด ${sv.expired+sv.out}</span>`:''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <span class="chip ${prob?'c-bad':'c-ok'}">${prob?prob+' รายการ':'ครบถ้วน'}</span>
        <span style="color:var(--hint);font-size:12px">›</span>
      </div>
    </div>`;
  });

  document.getElementById('scr').innerHTML=tabs+chartHtml+
    `<div class="card" style="padding:4px 14px">${monthRows}</div>`+cred();
}
function rHD(){
  const insp=INSPS.find(i=>i.id===S.did);if(!insp){rHist();return}
  const s=summ(insp,S.fid);const f=F(S.fid);const its=fItems(S.fid);

      <div class="kpi k-bad" style="padding:9px 10px"><div class="top" style="color:var(--bad)"><span class="n" style="font-size:19px">${s.expired+s.out}</span></div><div class="l">หมด/หมดอายุ</div></div></div></div>`;
  CATS.forEach(cat=>{h+=`<div class="sec-h">${cat.name}</div>`;its.filter(i=>i.cat===cat.id).forEach(it=>{const line=(insp.lines||{})[it.id]||{};const sm=SM[ls(line,it)];h+=`<div class="irow" style="cursor:default"><div><div style="font-size:14px;font-weight:700">${it.name}</div><div style="font-size:12px;color:var(--hint);margin-top:2px">${line.touched?lt(line)+' '+it.unit:'—'}${it.exp&&nx(line)?' · หมด '+xL(nx(line)):''}</div></div><span class="chip ${sm.c}">${sm.l}</span></div>`;});});
  h+=`<div class="s2 noprint" style="margin-top:14px">

    <button class="btn danger" onclick="delIns()">🗑 ลบการตรวจนี้</button>
  </div>`;
  document.getElementById('scr').innerHTML=h+cred();
}

async function pSh(rec){
  if(!gsUrl)return false;
  const its=fItems(rec.farmId);
  const cfg=FC(rec.farmId);
  const p={
    sheetId:SID,
    farm:F(rec.farmId).name,
    date:beD(rec.date),
    inspector:rec.inspector,
    ts:new Date(rec.ts).toISOString(),
    rows:its.map(it=>{
      const line=(rec.lines||{})[it.id]||{lots:[],touched:false};
      const stk=ls(line,it);
      const qty=line.touched?lt(line):0;
      const need=Math.max(0,(it.min||0)-qty);
      const cfgItem=cfg.items.find(x=>x.id===it.id);
      const note=(cfgItem&&cfgItem.note)||'';
      /* lot แยกรายการ เช่น "5 หลอด (06/2571), 3 หลอด (12/2572)" */
      const lotDetail=(line.lots||[]).filter(l=>l.qty>0).map(l=>{
        const expStr=l.exp?xL(l.exp):'';
        return l.qty+' '+it.unit+(expStr?' ('+expStr+')':'');
      }).join(', ')||'—';
      /* วันหมดอายุที่ใกล้ที่สุด (เฉพาะที่ยังไม่หมด) */
      const validLots=(line.lots||[]).filter(l=>l.exp&&daysTo(l.exp)>=0);
      const nearestExp=validLots.length?xL(validLots.sort((a,b)=>daysTo(a.exp)-daysTo(b.exp))[0].exp):'—';
      const daysLeft=validLots.length?daysTo(validLots.sort((a,b)=>daysTo(a.exp)-daysTo(b.exp))[0].exp):null;
      return{
        category:CN(it.cat),
        item:it.name,
        unit:it.unit,
        min:it.min,
        qty:line.touched?qty:'',
        lotDetail,
        nearestExp,
        daysLeft:daysLeft!==null?daysLeft:'',
        needToOrder:need>0?need:'',
        status:SM[stk].l,
        note,
      };
    })
  };
  try{
    await fetch(gsUrl,{method:'POST',mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify(p)});
    return true;
  }catch(e){return false;}
}

function editIns(){
  const insp=INSPS.find(i=>i.id===S.did);if(!insp)return;
  S.editId=insp.id;S.fid=insp.farmId;
  S.draft={lines:JSON.parse(JSON.stringify(insp.lines))};
  // ให้ทุก line ที่มีข้อมูลอยู่ถือว่า touched จริงๆ
  Object.values(S.draft.lines).forEach(l=>{if(l)l.touched=true;});
  go("inspect",{fid:insp.farmId});
}
async function delIns(){
  const insp=INSPS.find(i=>i.id===S.did);if(!insp)return;
  if(!confirm("ลบการตรวจวันที่ "+beD(insp.date)+" ?\nลบแล้วกู้คืนไม่ได้"))return;
  const delFid=insp.farmId;
  const delId=S.did;
  INSPS=INSPS.filter(i=>i.id!==delId);
  await saveIns();
  fbDeleteInsp(delId);
  /* อัป Sheet รายฟาร์มด้วยข้อมูลล่าสุด (หลังลบแล้ว) */
  const newLatest=latF(delFid);
  if(newLatest){
    /* ยังมีการตรวจอื่น → ส่งอันล่าสุด */
    pSh(newLatest);
  } else {
    /* ไม่มีข้อมูลเหลือ → ส่ง signal ว่าฟาร์มนี้ไม่มีข้อมูล */
    pShEmpty(delFid);
  }
  toast("ลบการตรวจแล้ว");
  go("farm-hist",{fid:delFid});
}

        <div style="font-size:11px;color:#b0312a;font-weight:600;margin-top:3px">หมด/หมดอายุ</div>
      </div>
    </div>

    <div style="margin-bottom:16px">
      <!-- ตารางเปรียบเทียบ 5 ศูนย์ -->
      <div>
        <div style="background:#1c7a3e;color:#fff;padding:6px 10px;font-size:12px;font-weight:700;border-radius:4px 4px 0 0">สถานะรายศูนย์</div>
        <table style="width:100%;border-collapse:collapse;font-size:11.5px;border:1px solid #ddd;border-top:none">
          <thead><tr style="background:#f0f0f0">
            <th style="padding:5px 8px;text-align:left;border:1px solid #ddd">ศูนย์</th>
            <th style="padding:5px 8px;border:1px solid #ddd;color:#1a7a4e">ปกติ</th>
            <th style="padding:5px 8px;border:1px solid #ddd;color:#b8860b">ใกล้หมด</th>
            <th style="padding:5px 8px;border:1px solid #ddd;color:#b85c00">ต่ำกว่า</th>
            <th style="padding:5px 8px;border:1px solid #ddd;color:#b0312a">หมด</th>
            <th style="padding:5px 8px;border:1px solid #ddd">คะแนน</th>
          </tr></thead>
          <tbody>${farmRows}</tbody>
        </table>
      </div>
    </div>

    <!-- รายการเร่งด่วนทุกศูนย์ -->
    <div>
      <div style="background:${urgentItems.length?'#b0312a':'#1c7a3e'};color:#fff;padding:6px 10px;font-size:12px;font-weight:700;border-radius:4px 4px 0 0">
        ${urgentItems.length?`⚠ รายการเร่งด่วนที่ต้องดำเนินการทันที (${urgentItems.length} รายการ)`:'✓ ไม่มีรายการเร่งด่วน'}
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:11.5px;border:1px solid #ddd;border-top:none">
        <thead><tr style="background:#f5f5f5">
          <th style="padding:5px 8px;text-align:left;border:1px solid #ddd">ศูนย์</th>
          <th style="padding:5px 8px;text-align:left;border:1px solid #ddd">รายการ</th>
          <th style="padding:5px 8px;border:1px solid #ddd">คงเหลือ</th>
          <th style="padding:5px 8px;border:1px solid #ddd">สถานะ</th>
        </tr></thead>
        <tbody>${urgentRows}</tbody>
      </table>
    </div>

    <!-- ลายเซ็น -->
    <div style="margin-top:28px;display:flex;justify-content:flex-start">
      <div style="width:55%;max-width:340px">
        <div style="border-top:1px solid #999;padding-top:8px;font-size:12px">
          <div style="font-weight:700">ผู้ตรวจสต็อก</div>
          <div style="color:#777;margin-top:16px">ลงชื่อ ................................................</div>
          <div style="color:#777;margin-top:6px">(${lastInspector})</div>
          <div style="color:#777;margin-top:6px">วันที่ ${lastInspDate||'...............................'}</div>
        </div>
      </div>
    </div>

    <!-- footer -->
    <div style="margin-top:24px;border-top:1px solid #ddd;padding-top:5px;display:flex;justify-content:space-between;font-size:9px;color:#bbb">
      <span>MediTrack · ระบบตรวจนับสต็อกยาและเวชภัณฑ์ MSBRC-2</span>
      <span>${today}</span>
      <span>${DEV.name} · ${DEV.role}</span>
    </div>
  </div>`;


  /* ── รายการสั่งของใน PDF ── */
  const allPendOrds=ORDERS.filter(o=>o.status!=='received')
    .sort((a,b)=>new Date(a.orderDate)-new Date(b.orderDate));
  if(allPendOrds.length){
    const STATUS_PDF={pending:'🟡 รอดำเนินการ',ordered:'🔵 สั่งแล้ว'};
    let ordRows='';
    allPendOrds.forEach(o=>{
      const f2=FARMS.find(x=>x.id===o.farmId)||{name:'?',c:'#999'};
      const expD=o.expectedDate?beD(o.expectedDate+'T00:00:00'):'—';
      ordRows+=`<tr>
        <td style="padding:5px 7px;border:1px solid #ddd">${f2.name}</td>
        <td style="padding:5px 7px;border:1px solid #ddd;font-weight:600">${o.itemName}</td>
        <td style="padding:5px 7px;border:1px solid #ddd;text-align:center">${o.qty||'—'} ${o.unit||''}</td>
        <td style="padding:5px 7px;border:1px solid #ddd;text-align:center">${o.orderDate?beD(o.orderDate+'T00:00:00'):'—'}</td>
        <td style="padding:5px 7px;border:1px solid #ddd;text-align:center">${expD}</td>
        <td style="padding:5px 7px;border:1px solid #ddd;text-align:center">${STATUS_PDF[o.status]||o.status}</td>
        <td style="padding:5px 7px;border:1px solid #ddd;color:#555">${o.note||''}</td>
      </tr>`;
    });
    pr.innerHTML+=`
    <div style="page-break-before:auto;margin-top:18px">
      <div style="background:#1c4a7a;color:#fff;padding:7px 12px;border-radius:6px 6px 0 0;font-size:13px;font-weight:700">
        📋 รายการที่อยู่ระหว่างสั่งซื้อ (${allPendOrds.length} รายการ)
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:12px;font-family:'Sarabun',Arial">
        <tr style="background:#e8f0f8">
          <th style="padding:5px 7px;border:1px solid #ddd;text-align:left">ศูนย์</th>
          <th style="padding:5px 7px;border:1px solid #ddd;text-align:left">รายการ</th>
          <th style="padding:5px 7px;border:1px solid #ddd">จำนวน</th>
          <th style="padding:5px 7px;border:1px solid #ddd">วันที่สั่ง</th>
          <th style="padding:5px 7px;border:1px solid #ddd">คาดว่าได้รับ</th>
          <th style="padding:5px 7px;border:1px solid #ddd">สถานะ</th>
          <th style="padding:5px 7px;border:1px solid #ddd;text-align:left">หมายเหตุ</th>
        </tr>
        ${ordRows}
      </table>
    </div>`;
  }

  pr.style.display = 'block';
  const _hidePrt=()=>{pr.style.display='none';window.onafterprint=null;};
  window.onafterprint=_hidePrt;
  window.print();
  setTimeout(_hidePrt, 2000);
}


/* ── THEME TOGGLE ── */
function toggleTheme(){
  const html=document.documentElement;
  const isLight=html.getAttribute('data-theme')==='light';
  if(isLight){
    html.removeAttribute('data-theme');
    localStorage.setItem('meditrack_theme','dark');
    document.getElementById('thbtn').textContent='☀️';
  }else{
    html.setAttribute('data-theme','light');
    localStorage.setItem('meditrack_theme','light');
    document.getElementById('thbtn').textContent='🌙';
  }
}
function initTheme(){
  const t=localStorage.getItem('meditrack_theme')||'dark';
  if(t==='light'){
    document.documentElement.setAttribute('data-theme','light');
    const b=document.getElementById('thbtn');
    if(b)b.textContent='🌙';
  }
}

initTheme();boot();

</script>
<div id="modalEl" style="display:none"></div>
