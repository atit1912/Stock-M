  --below:#ef9a5d;--below-bg:#2c1f16;--below-bd:#4e3420;
  --bad:#f0726b;--bad-bg:#2c1717;--bad-bd:#4e2424;
  --pend:#8aa39a;--pend-bg:#1c2823;
  --fc:#5fbf8e;--fb:#15251c;
  --r:13px;--nh:64px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;background:var(--bg)}
body{font-family:'Sarabun',-apple-system,sans-serif;font-size:16px;color:var(--ink);-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh;max-width:520px;margin:0 auto;background:var(--bg)}
.ab{flex:none;height:58px;display:flex;align-items:center;padding:0 14px;gap:10px;z-index:20;background:var(--card);border-bottom:1px solid var(--line)}
.bb{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.15);color:#dfe;border-radius:8px;padding:5px 10px 5px 7px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;flex:none;white-space:nowrap}
.bb .arr{font-size:17px;line-height:1}
.ab .logo{width:36px;height:36px;border-radius:8px;background:#fff;padding:2px;object-fit:contain;flex:none}
.ab h1{font-size:15px;font-weight:700;color:#fff;line-height:1.2}
.ab .sub{font-size:10.5px;color:var(--mut)}
.ibtn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:rgba(255,255,255,.08);color:#dfe;border:none;font-size:18px;cursor:pointer;flex:none;font-family:inherit;position:relative}
.bdg{position:absolute;top:-3px;right:-4px;background:var(--bad);color:#1a0f0f;font-size:9px;font-weight:700;padding:0 4px;border-radius:99px;min-width:15px;text-align:center;line-height:15px}
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 80px}
.bnav{flex:none;height:var(--nh);background:var(--bg2);border-top:1px solid var(--line);display:flex;z-index:20}
.bnav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:var(--hint);cursor:pointer;gap:2px;border:none;background:none;font-family:inherit;position:relative;padding-bottom:4px}
.bnav a .ic{font-size:20px;line-height:1}
.bnav a.on{color:var(--fc);font-weight:700}
.bnav a .nb{position:absolute;top:7px;right:calc(50% - 20px);background:var(--bad);color:#1a0f0f;font-size:8px;font-weight:700;padding:0 4px;border-radius:99px;min-width:14px;text-align:center;line-height:14px}
/* footer credit */
.cred{text-align:center;padding:10px 14px 4px;font-size:11px;color:var(--hint);border-top:1px solid var(--line);margin-top:6px}
.cred strong{color:var(--mut);font-weight:600}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px;margin-bottom:11px}
.chip{font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;white-space:nowrap}
.c-ok{background:var(--ok-bg);color:var(--ok)}.c-near{background:var(--near-bg);color:var(--near)}
.c-below{background:var(--below-bg);color:var(--below)}.c-bad{background:var(--bad-bg);color:var(--bad)}
.c-pend{background:var(--pend-bg);color:var(--pend)}
.mini{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:7px}
.fdot{width:9px;height:9px;border-radius:50%;display:inline-block;flex:none;vertical-align:middle;margin-right:5px}
label.fld{display:block;font-size:13px;color:var(--mut);margin:0 0 5px 1px;font-weight:600}
select,input[type=text],input[type=month],input[type=search]{font-family:inherit;font-size:15px;color:var(--ink);border:1px solid var(--line2);background:var(--card2);border-radius:10px;padding:9px 12px;width:100%}
select:focus,input:focus{outline:none;border-color:var(--fc);box-shadow:0 0 0 3px rgba(95,191,142,.15)}
::placeholder{color:var(--hint)}
.btn{font-family:inherit;font-size:15px;font-weight:700;border:none;border-radius:11px;padding:12px 16px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%}
.btn:active{opacity:.82}
.btn.prim{background:var(--fc);color:#08130d}
.btn.sec{background:var(--card2);color:var(--ink);border:1px solid var(--line2)}
.btn.sm{font-size:13px;font-weight:600;padding:8px 13px;width:auto;border-radius:9px}
.btn.cta{font-size:17px;padding:16px;border-radius:13px}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.sec-h{font-size:12.5px;font-weight:700;color:var(--mut);padding:12px 2px 7px;letter-spacing:.3px}
.prog{height:9px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:6px}
.prog i{display:block;height:100%;background:var(--fc);border-radius:99px;transition:width .3s}
.stepper{display:flex;align-items:center;gap:8px}
.stepper button{width:38px;height:38px;border-radius:10px;border:1px solid var(--line2);background:var(--card2);font-size:21px;cursor:pointer;color:var(--ink);flex:none;font-family:inherit}
.qty{min-width:30px;text-align:center;font-size:20px;font-weight:700}
.lot{display:flex;align-items:center;gap:7px;margin-top:9px}
.lot input[type=month]{flex:1;padding:8px 10px;font-size:14px}
.lot .rm{width:34px;height:34px;border-radius:8px;border:1px solid var(--line2);background:var(--card2);color:var(--bad);font-size:15px;cursor:pointer;flex:none;font-family:inherit}
.addlot{font-size:13px;font-weight:700;color:var(--fc);background:var(--fb);border:1px solid var(--ok-bd);border-radius:9px;padding:8px 13px;cursor:pointer;font-family:inherit}
.nostock{font-size:13px;font-weight:600;color:var(--mut);background:var(--card2);border:1px solid var(--line2);border-radius:9px;padding:8px 13px;cursor:pointer;font-family:inherit}
.s4{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.s2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi{border-radius:12px;padding:12px 13px;border:1px solid}
.kpi .top{display:flex;align-items:center;gap:7px}
.kpi .n{font-size:25px;font-weight:700;line-height:1}
.kpi .l{font-size:11.5px;color:var(--mut);margin-top:3px}
.k-ok{background:var(--ok-bg);border-color:var(--ok-bd)}
.k-near{background:var(--near-bg);border-color:var(--near-bd)}
.k-below{background:var(--below-bg);border-color:var(--below-bd)}
.k-bad{background:var(--bad-bg);border-color:var(--bad-bd)}
.sbox{border-radius:11px;padding:10px 8px;text-align:center}
.sbox .n{font-size:21px;font-weight:700;line-height:1.1}
.sbox .l{font-size:11px;margin-top:3px;line-height:1.3}
.flist{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-left:5px solid var(--fc);border-radius:10px;padding:10px 13px;margin-bottom:8px;cursor:pointer}
.flist:active{background:var(--card2)}
.acti{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.acti:last-child{border-bottom:none;padding-bottom:2px}
.irow{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.fmenu{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mb{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:0;cursor:pointer;text-align:left;font-family:inherit;overflow:hidden;display:flex;flex-direction:column}
.mb:active{background:var(--card2)}
.mb .mbar{height:5px;width:100%}
.mb .mbody{padding:13px 12px 14px}
.mb .mic{font-size:23px;margin-bottom:7px;display:block;color:var(--fc)}
.mb .mtt{font-size:14px;font-weight:700;color:var(--ink);line-height:1.3}
.mb .msb{font-size:11.5px;color:var(--mut);margin-top:3px}
.mb.wide{grid-column:span 2;flex-direction:row;align-items:stretch}
.mb.wide .mbar{width:5px;height:auto}
.mb.wide .mbody{display:flex;align-items:center;gap:12px;padding:13px 14px;flex:1}
.mb.wide .mic{font-size:25px;margin:0;flex:none}
.seg{display:flex;gap:6px;margin-bottom:12px}
.seg button{flex:1;padding:9px 4px;border-radius:10px;border:1px solid var(--line2);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--card2);color:var(--mut)}
.seg .on{background:var(--fc);color:#08130d;border-color:var(--fc)}
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mnav button{background:none;border:none;font-size:22px;cursor:pointer;color:var(--fc);padding:4px 10px;font-family:inherit}
.mnav .label{font-size:15px;font-weight:700}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.blbl{font-size:11.5px;color:var(--mut);width:62px;text-align:right;flex:none}
.btrk{flex:1;height:18px;background:var(--bg2);border-radius:6px;overflow:hidden;position:relative}
.rk{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
.rk:last-child{border-bottom:none}
.rk .pos{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex:none}
.sw{display:flex;align-items:center;gap:10px;position:relative;margin-bottom:12px}
.sw .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--hint);font-size:16px;pointer-events:none}
.sw input{padding-left:36px}
.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:#05201a;border:1px solid var(--ok-bd);color:#dfffef;padding:11px 18px;border-radius:11px;font-size:13.5px;z-index:99;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.empty{text-align:center;padding:40px 16px;color:var(--hint);font-size:14px}
table.rep{width:100%;border-collapse:collapse;font-size:12.5px}
table.rep th,table.rep td{border:1px solid var(--line2);padding:7px 8px;text-align:center;color:var(--ink)}
table.rep th{font-weight:700;font-size:12px;color:var(--mut)}
table.rep td.l{text-align:left}
.canvas-wrap{position:relative;height:175px}
#prt{display:none;position:fixed;inset:0;z-index:9999;background:#fff;overflow-y:auto;padding:0}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  html,body{background:#fff!important;margin:0!important;padding:0!important;height:auto!important;overflow:visible!important}
  .app,.scr,.bnav,.ab,nav,#toast,.modal-bg{display:none!important}
  #prt{display:block!important;position:static!important;background:#fff!important;color:#111!important}
  @page{size:A4;margin:10mm}
}


.tgl{width:42px;height:24px;border-radius:99px;border:none;cursor:pointer;position:relative;flex:none;transition:background .2s}
.tgl.on{background:var(--fc)}.tgl.off{background:var(--line2)}
.tgl::after{content:"";position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .15s}
.tgl.on::after{left:21px}.tgl.off::after{left:3px}
.btn.danger{background:var(--bad-bg);color:var(--bad);border:1px solid var(--bad-bd)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;display:flex;align-items:flex-end}
.modal{background:var(--card);border-radius:18px 18px 0 0;padding:20px 18px 34px;width:100%;max-width:520px;margin:0 auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:14px;color:var(--ink)}
.footer-dev{text-align:center;padding:14px 0 4px;font-size:10.5px;color:var(--hint);border-top:1px solid var(--line);margin-top:8px}
.sw-wrap{position:relative;margin-bottom:12px}
.sw-wrap .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--hint);font-size:16px;pointer-events:none}
.sw-wrap input{padding-left:36px}
</style>
</head>

/* ── HELPERS ── */
function F(id){return FARMS.find(x=>x.id===id)||FARMS[0]}
function FC(fid){return FARM_CFG[fid]||(FARM_CFG[fid]={items:STD_ITEMS.map(x=>({...x})),resp:'',inspector:INSPECTORS[0]}),FARM_CFG[fid]}
function fItems(fid){return FC(fid).items.filter(x=>!x.hidden)}
function CN(id){const c=CATS.find(x=>x.id===id);return c?c.name:''}
function beD(iso){const d=new Date(iso);const M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];return d.getDate()+' '+M[d.getMonth()]+' '+(d.getFullYear()+543)}
function thM(ym){if(!ym)return'';const[y,m]=ym.split('-');const M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];return M[parseInt(m)-1]+' '+(parseInt(y)+543)}
function xL(ym){if(!ym)return'—';const[y,m]=ym.split('-');return m+'/'+(parseInt(y)+543)}
function nowYM(){const n=new Date();return n.getFullYear()*12+n.getMonth()}
function daysTo(ym){if(!ym)return null;const[y,m]=ym.split('-').map(Number);const t=new Date(y,m,0);return Math.round((t-Date.now())/86400000)}
function daysSince(iso){return Math.floor((Date.now()-new Date(iso))/86400000)}
function lt(line){return(line.lots||[]).reduce((s,l)=>s+(parseInt(l.qty)||0),0)}
function nx(line){return(line.lots||[]).filter(l=>l.exp).map(l=>l.exp).sort()[0]||''}
function ls(line,item){
  if(!line||!line.touched)return'pending';
  const t=lt(line);if(t===0)return'out';
  let ex=false,nr=false;const c=nowYM();
  (line.lots||[]).forEach(l=>{if(l.exp){const[y,m]=l.exp.split('-').map(Number);const v=y*12+(m-1);if(v<c)ex=true;else if(v-c<=NM)nr=true;}});
  if(ex)return'expired';if(t<(item.min||0))return'below';if(nr)return'near';return'ok';
}
function summ(insp,fid){
  const its=fItems(fid);
  const c={ok:0,near:0,below:0,expired:0,out:0,pending:0};
  its.forEach(it=>{const l=(insp.lines||{})[it.id]||{lots:[],touched:false};c[ls(l,it)]++;});
  return c;
}
function latF(fid){return INSPS.filter(i=>i.farmId===fid).sort((a,b)=>b.ts-a.ts)[0]||null}
function latFM(fid,ym){return INSPS.filter(i=>i.farmId===fid&&i.date.startsWith(ym)).sort((a,b)=>b.ts-a.ts)[0]||null}
function allKPI(){const c={ok:0,near:0,below:0,expired:0,out:0,pending:0};FARMS.forEach(f=>{const li=latF(f.id);if(li){const s=summ(li,f.id);for(const k in c)c[k]+=s[k];}});return c}
function buildAlerts(){
  const A=[];
  FARMS.forEach(f=>{const li=latF(f.id);
    if(!li){A.push({sev:2,fid:f.id,farm:f.name,fc:f.c,title:'ยังไม่เคยตรวจ',desc:'ศูนย์นี้ยังไม่มีข้อมูล',sub:'ยังไม่ตรวจ',col:'var(--near)',ic:'🕒'});return;}
    const ds=daysSince(li.date);
    if(ds>=STALE)A.push({sev:2,fid:f.id,farm:f.name,fc:f.c,title:f.sh,desc:'ไม่ได้ตรวจมา '+ds+' วัน',sub:'ค้างตรวจ',col:'var(--near)',ic:'🕒'});
    fItems(f.id).forEach(it=>{const line=(li.lines||{})[it.id]||{lots:[],touched:false};const stk=ls(line,it);
      if(stk==='expired')A.push({sev:0,fid:f.id,farm:f.name,fc:f.c,title:it.name,desc:'หมดอายุแล้ว ('+xL(nx(line))+')',sub:'หมดอายุ',col:'var(--bad)',ic:'⛔'});
      else if(stk==='out')A.push({sev:0,fid:f.id,farm:f.name,fc:f.c,title:it.name,desc:'ไม่มีของในคลัง',sub:'หมด',col:'var(--bad)',ic:'⛔'});
      else if(stk==='near'){const d=daysTo(nx(line));A.push({sev:1,fid:f.id,farm:f.name,fc:f.c,title:it.name,desc:'ใกล้หมดอายุ'+(d!=null?' ใน '+d+' วัน':''),sub:'ใกล้หมดอายุ',col:'var(--near)',ic:'⏰'});}
      else if(stk==='below')A.push({sev:1,fid:f.id,farm:f.name,fc:f.c,title:it.name,desc:'ต่ำกว่าเกณฑ์ (เหลือ '+lt(line)+' '+it.unit+')',sub:'ต่ำกว่าเกณฑ์',col:'var(--below)',ic:'🔻'});
    });
  });
  A.sort((a,b)=>a.sev-b.sev);return A;
}

  FARMS.forEach(f=>{const li=latF(f.id);const s=li?summ(li,f.id):null;const warn=s?s.near+s.below+s.expired+s.out:0;
    h+=`<div class="flist" style="border-left-color:${f.c}" onclick="go('${target}',{fid:${f.id}${target==='inspect'?',draft:null':''}})">
      <span class="fdot" style="background:${f.c};width:11px;height:11px;margin:0"></span>
      <div style="flex:1;min-width:0"><div style="font-size:13.5px;font-weight:700">${f.name}</div>
      <div style="font-size:11px;color:var(--mut)">${li?'ตรวจล่าสุด '+beD(li.date):'ยังไม่เคยตรวจ'}${warn?` · <span style="color:var(--near)">เตือน ${warn}</span>`:''}</div></div>
      <span style="color:var(--hint)">›</span></div>`;});
  h+=cred();document.getElementById('scr').innerHTML=h;
}

/* ── FARM HUB ── */

  const f=F(S.fid);const li=latF(f.id);const its=fItems(f.id);
  const s=li?summ(li,f.id):{ok:0,near:0,below:0,expired:0,out:0,pending:its.length};
  const done=li?its.filter(it=>(li.lines||{})[it.id]?.touched).length:0;
  const prob=s.expired+s.out+s.below+s.near;
  let h=`<div style="background:${f.bg};border:1px solid ${f.c}55;border-radius:var(--r);padding:13px 14px;margin-bottom:13px">
    <div class="s4">
      <div class="kpi k-ok" style="padding:10px 11px"><div class="top" style="color:var(--ok)"><span class="n" style="font-size:22px">${s.ok}</span></div><div class="l">ปกติ</div></div>
      <div class="kpi k-near" style="padding:10px 11px"><div class="top" style="color:var(--near)"><span class="n" style="font-size:22px">${s.near}</span></div><div class="l">ใกล้หมด</div></div>

    <div class="row" style="padding:8px 0;border-bottom:1px solid var(--line)"><span style="font-size:13px;color:var(--mut)">👤 ผู้ตรวจ</span><span style="font-size:13px;font-weight:700">${li?li.inspector:'—'}</span></div>
    <div class="row" style="padding:8px 0;border-bottom:1px solid var(--line)"><span style="font-size:13px;color:var(--mut)">📦 รายการยา</span><span style="font-size:13px;font-weight:700">${its.length} รายการ</span></div>
    <div class="row" style="padding:8px 0 3px"><span style="font-size:13px;color:var(--mut)">✓ ตรวจแล้ว</span><span style="font-size:13px;font-weight:700;color:var(--ok)">${done} (${its.length?Math.round(done/its.length*100):0}%)</span></div>
  </div>
  ${prob?`<div style="background:var(--bad-bg);border:1px solid var(--bad-bd);border-radius:var(--r);padding:10px 14px;margin-bottom:13px;font-size:13px;color:var(--bad);font-weight:600">⚠ มี ${prob} รายการต้องดำเนินการ</div>`:''}
  <button class="btn prim cta" style="margin-bottom:14px" onclick="go('inspect',{fid:${f.id},draft:null})">＋ ตรวจนับใหม่</button>

    <button class="mb" onclick="go('farm-report',{fid:${f.id}})"><div class="mbar" style="background:${f.c}"></div><div class="mbody"><span class="mic">▤</span><div class="mtt">รายงาน</div><div class="msb">รายเดือน / ทั้งหมด</div></div></button>
    <button class="mb" onclick="go('inspect-history',{fid:${f.id}})"><div class="mbar" style="background:${f.c}"></div><div class="mbody"><span class="mic">↺</span><div class="mtt">ประวัติการตรวจ</div><div class="msb">ดูย้อนหลัง</div></div></button>
    <button class="mb" onclick="go('farm-settings',{fid:${f.id}})"><div class="mbar" style="background:${f.c}"></div><div class="mbody"><span class="mic">⚙</span><div class="mtt">จัดการรายการ / ตั้งค่า</div><div class="msb">เพิ่ม · ซ่อน · ขั้นต่ำ</div></div></button>

/* ── INSPECT ── */
function nDraft(fid){const L={};fItems(fid).forEach(it=>L[it.id]={lots:[],touched:false});return{lines:L}}
function cpL(){const li=latF(S.fid);if(!li){toast('ยังไม่มีข้อมูลครั้งก่อน');return}
  fItems(S.fid).forEach(it=>{const p=(li.lines||{})[it.id];const d=S.draft.lines[it.id];if(p&&p.touched){d.lots=(p.lots||[]).map(l=>({qty:l.qty,exp:l.exp}));d.touched=true;}});
  rInsp();toast('คัดลอกจากครั้งก่อนแล้ว')}
function rInsp(){
  if(!S.draft){S.draft=nDraft(S.fid);S.editId=null;}
  const editBanner=S.editId?`<div style="background:var(--near-bg);border:1px solid var(--near-bd);color:var(--near);border-radius:10px;padding:9px 13px;margin-bottom:11px;font-size:13px;font-weight:600">✎ กำลังแก้ไขการตรวจเดิม — บันทึกแล้วจะทับข้อมูลเดิม</div>`:'';S.q='';
  const f=F(S.fid);const cfg=FC(S.fid);
  const its=fItems(S.fid);
  let h=editBanner+`<div class="card" style="border-left:5px solid ${f.c}">
    <label class="fld">ผู้ตรวจ</label>
    ${inspSel(cfg.inspector||INSPECTORS[0])}
    <div class="row"><span style="font-size:13px;color:var(--mut)">${beD(new Date().toISOString())}</span>
    <button class="btn sm sec" onclick="cpL()">คัดลอกครั้งก่อน</button></div></div>
  <div class="card" style="padding:12px 14px">
    <div class="row" style="margin-bottom:3px"><span style="font-size:13px;font-weight:700">ความคืบหน้า</span><span style="font-size:13px;font-weight:700;color:var(--fc)" id="ppct">0%</span></div>
    <div style="font-size:12px;color:var(--mut)" id="pt">0 / ${its.length} รายการ</div>
    <div class="prog"><i id="pb" style="width:0%"></i></div></div>
  <div class="sw"><span class="si">🔍</span><input type="search" id="srch" placeholder="ค้นหารายการยา / เวชภัณฑ์" oninput="filtI(this.value)"></div>
  <div id="ilist">${iList('')}</div>
  <button class="btn prim" style="margin-top:8px" onclick="svI()">บันทึกการตรวจนับ</button>${cred()}`;
  document.getElementById('scr').innerHTML=h;upP();
}
function iList(q){let h='';const qq=q.trim().toLowerCase();const its=fItems(S.fid);
  CATS.forEach(cat=>{const items=its.filter(i=>i.cat===cat.id&&(!qq||i.name.toLowerCase().includes(qq)));
    if(!items.length)return;h+=`<div class="sec-h">${cat.name}</div>`;items.forEach(it=>h+=iH(it));});
  return h||`<div class="empty">ไม่พบรายการที่ค้นหา</div>`}
function filtI(q){S.q=q;document.getElementById('ilist').innerHTML=iList(q)}
function iH(it){
  const line=(S.draft.lines||{})[it.id]||{lots:[],touched:false};const sm=SM[ls(line,it)];
  let body='';
  if(!line.touched){
    body=`<div class="row" style="margin-top:11px;gap:8px"><button class="addlot" style="flex:1" onclick="fLot('${it.id}')">＋ ระบุจำนวน</button><button class="nostock" onclick="mNone('${it.id}')">ไม่มีของ</button></div>`;
  }else{
    const lots=(line.lots||[]).map((l,i)=>`<div class="lot">
      <div class="stepper"><button onclick="cQ('${it.id}',${i},-1)">−</button><span class="qty" id="q${it.id}_${i}">${parseInt(l.qty)||0}</span><button onclick="cQ('${it.id}',${i},1)">＋</button></div>
      ${it.exp?`<input type="month" value="${l.exp||''}" onchange="sE('${it.id}',${i},this.value)">`:`<span style="flex:1;font-size:12px;color:var(--hint)">ไม่มีวันหมดอายุ</span>`}
      <button class="rm" onclick="rL('${it.id}',${i})">✕</button></div>`).join('');
    body=`${lots||`<div style="font-size:13px;color:var(--hint);margin-top:8px">บันทึกว่าไม่มีของ</div>`}
    <div class="row" style="margin-top:10px"><button class="addlot" onclick="aL('${it.id}')">＋ เพิ่มล็อต</button><span style="font-size:12px;color:var(--hint)">รวม ${lt(line)} ${it.unit}</span></div>`;
  }
  return`<div class="card" id="cd${it.id}" style="margin-bottom:10px">
    <div class="row" style="align-items:flex-start">
      <div style="min-width:0"><div style="font-size:15px;font-weight:700">${it.name}</div>
      <div style="font-size:12px;color:var(--hint);margin-top:2px">ขั้นต่ำ ${it.min} ${it.unit}</div></div>
      <span class="chip ${sm.c}" id="cp${it.id}">${sm.l}</span></div>${body}</div>`;
}
function rC(id){const it=fItems(S.fid).find(x=>x.id===id);const el=document.getElementById('cd'+id);if(el&&it)el.outerHTML=iH(it);upP()}
function rfC(id){const it=fItems(S.fid).find(x=>x.id===id);if(!it)return;const line=(S.draft.lines||{})[id]||{lots:[],touched:false};const sm=SM[ls(line,it)];const c=document.getElementById('cp'+id);if(c){c.className='chip '+sm.c;c.textContent=sm.l;}upP()}
function fLot(id){if(!S.draft.lines[id])S.draft.lines[id]={lots:[],touched:false};S.draft.lines[id]={lots:[{qty:1,exp:''}],touched:true};rC(id)}
function mNone(id){S.draft.lines[id]={lots:[],touched:true};rC(id)}
function aL(id){if(!S.draft.lines[id])S.draft.lines[id]={lots:[],touched:true};S.draft.lines[id].lots.push({qty:1,exp:''});S.draft.lines[id].touched=true;rC(id)}
function rL(id,i){S.draft.lines[id].lots.splice(i,1);rC(id)}
function cQ(id,i,d){const l=S.draft.lines[id]?.lots[i];if(!l)return;l.qty=Math.max(0,(parseInt(l.qty)||0)+d);S.draft.lines[id].touched=true;const el=document.getElementById('q'+id+'_'+i);if(el)el.textContent=l.qty;rfC(id)}
function sE(id,i,v){if(S.draft.lines[id]?.lots[i])S.draft.lines[id].lots[i].exp=v;S.draft.lines[id].touched=true;rfC(id)}
function upP(){const its=fItems(S.fid);let d=0;its.forEach(it=>{if(S.draft?.lines[it.id]?.touched)d++;});const pct=its.length?Math.round(d/its.length*100):0;const pt=document.getElementById('pt');const pb=document.getElementById('pb');const pp=document.getElementById('ppct');if(pt)pt.textContent=d+' / '+its.length+' รายการ';if(pb)pb.style.width=pct+'%';if(pp)pp.textContent=pct+'%'}
async function svI(){
  const its=fItems(S.fid);
  const isel=document.getElementById('isel');const insp=isel?isel.value:FC(S.fid).inspector||INSPECTORS[0];
  if(!its.some(it=>S.draft.lines[it.id]?.touched)){toast('ยังไม่ได้ตรวจรายการใดเลย');return}
  const done=its.filter(it=>S.draft.lines[it.id]?.touched).length;
  if(done<its.length&&!confirm(`ตรวจแล้ว ${done}/${its.length} รายการ
ที่เหลือบันทึกเป็น "ยังไม่ตรวจ" — ยืนยัน?`))return;
  FC(S.fid).inspector=insp;
  let rec;
  if(S.editId){
    const ex=INSPS.find(i=>i.id===S.editId);
    rec=ex||{id:S.editId,farmId:S.fid};
    rec.lines=JSON.parse(JSON.stringify(S.draft.lines));rec.inspector=insp;
    rec.edited=new Date().toISOString();
  }else{
    rec={id:"i"+Date.now(),farmId:S.fid,date:new Date().toISOString(),ts:Date.now(),inspector:insp,lines:JSON.parse(JSON.stringify(S.draft.lines))};
    INSPS.push(rec);
  }
  await saveIns();await saveCfg();
  S.draft=null;
  const sent=await pSh(rec);
  toast(sent?'บันทึกและส่งเข้า Google Sheet แล้ว ✓':'บันทึกในเครื่องแล้ว แต่ส่งเข้า Google Sheet ไม่สำเร็จ');
  go('farm',{fid:S.fid});
}

/* ── OVERVIEW ── */
function rOv(){
  const li=latF(S.fid);const its=fItems(S.fid);
  if(!li){document.getElementById('scr').innerHTML='<div class="empty">ยังไม่มีข้อมูล<br>กด "ตรวจนับใหม่" เพื่อเริ่ม</div>'+cred();return}
  const s=summ(li,S.fid);
  let h=`<div class="sw"><span class="si">🔍</span><input type="search" id="ovs" placeholder="ค้นหารายการ" oninput="ovFilt(this.value)"></div>
  <div style="display:flex;gap:6px;margin-bottom:12px">
    <button id="fa" class="btn sm prim" style="flex:1" onclick="ovF('all')">ทั้งหมด</button>
    <button id="fp" class="btn sm sec" style="flex:1" onclick="ovF('prob')">⚠ ต้องดูแล</button></div>
  <div id="ovr"></div>${cred()}`;
  document.getElementById('scr').innerHTML=h;
  S._ovMode='all';S._ovQ='';
  window.ovF=m=>{S._ovMode=m;document.getElementById('fa').className='btn sm '+(m==='all'?'prim':'sec');document.getElementById('fp').className='btn sm '+(m==='prob'?'prim':'sec');document.getElementById('ovr').innerHTML=ovRw(li,its);};
  window.ovFilt=q=>{S._ovQ=q;document.getElementById('ovr').innerHTML=ovRw(li,its);};
  document.getElementById('ovr').innerHTML=ovRw(li,its);
}
function ovRw(li,its){let r='';const qq=(S._ovQ||'').trim().toLowerCase();
  CATS.forEach(cat=>{let rows='';its.filter(i=>i.cat===cat.id).forEach(it=>{if(qq&&!it.name.toLowerCase().includes(qq))return;const line=(li.lines||{})[it.id]||{lots:[],touched:false};const stk=ls(line,it);const sm=SM[stk];if(S._ovMode==='prob'&&(stk==='ok'||stk==='pending'))return;rows+=`<div class="irow" style="cursor:default"><div><div style="font-size:14px;font-weight:700">${it.name}</div><div style="font-size:12px;color:var(--hint);margin-top:2px">${line.touched?lt(line)+' '+it.unit:'—'}${it.exp&&nx(line)?' · หมด '+xL(nx(line)):''} · ขั้นต่ำ ${it.min}</div></div><span class="chip ${sm.c}">${sm.l}</span></div>`;});if(rows)r+=`<div class="sec-h">${cat.name}</div>${rows}`;});
  return r||'<div class="empty">ไม่พบรายการ</div>';}

/* ── REPORT ── */
function rRep(){
  const f=F(S.fid);const n=new Date();const its=fItems(S.fid);
  if(!S.rym)S.rym=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');
  const isM=S.rm==='month';
  const li=isM?latFM(S.fid,S.rym):latF(S.fid);
  const s=li?summ(li,S.fid):{ok:0,near:0,below:0,expired:0,out:0,pending:its.length};
  const acts=[];
  if(li){its.forEach(it=>{const line=(li.lines||{})[it.id]||{};const stk=ls(line,it);if(['expired','out','below','near'].includes(stk))acts.push({it,stk,total:lt(line),ne:nx(line)});});acts.sort((a,b)=>['expired','out','below','near'].indexOf(a.stk)-['expired','out','below','near'].indexOf(b.stk));}
  const tr=[];for(let i=5;i>=0;i--){const d=new Date(n.getFullYear(),n.getMonth()-i,1);const ym=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');const ti=latFM(S.fid,ym);const ts=ti?summ(ti,S.fid):{near:0,below:0,expired:0,out:0};tr.push({label:thM(ym).split(' ')[0],val:ts.near+ts.below+ts.expired+ts.out,has:!!ti});}
  let h=`<div class="seg"><button class="${isM?'on':''}" onclick="S.rm='month';rRep()">รายเดือน</button><button class="${!isM?'on':''}" onclick="S.rm='all';rRep()">ทั้งหมด (ล่าสุด)</button></div>`;
  if(isM)h+=`<div class="mnav"><button onclick="cMon(-1)">‹</button><div class="label">${thM(S.rym)}</div><button onclick="cMon(1)">›</button></div>`;
  if(!li){h+=`<div class="card"><div class="empty">ไม่มีข้อมูล${isM?'ในเดือนนี้':''}</div></div>${cred()}`;document.getElementById('scr').innerHTML=h;window.cMon=cMonFn;return}
  h+=`<div style="font-size:12px;color:var(--mut);margin-bottom:12px">ตรวจ ${beD(li.date)} · ${li.inspector}</div>`;
  h+=`<div class="s4" style="margin-bottom:14px">
    <div class="kpi k-ok" style="padding:10px 11px"><div class="top" style="color:var(--ok)"><span class="n" style="font-size:22px">${s.ok}</span></div><div class="l">ปกติ</div></div>
    <div class="kpi k-near" style="padding:10px 11px"><div class="top" style="color:var(--near)"><span class="n" style="font-size:22px">${s.near}</span></div><div class="l">ใกล้หมด</div></div>
    <div class="kpi k-below" style="padding:10px 11px"><div class="top" style="color:var(--below)"><span class="n" style="font-size:22px">${s.below}</span></div><div class="l">ต่ำกว่า</div></div>
    <div class="kpi k-bad" style="padding:10px 11px"><div class="top" style="color:var(--bad)"><span class="n" style="font-size:22px">${s.expired+s.out}</span></div><div class="l">หมด/หมดอายุ</div></div></div>`;
  h+=`<div class="sec-h">สัดส่วนสถานะ</div><div class="card"><div style="display:flex;align-items:center;gap:14px">
    <div style="position:relative;width:130px;height:130px;flex:none"><canvas id="pie"></canvas>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none"><div style="font-size:22px;font-weight:700">${its.length}</div><div style="font-size:10px;color:var(--mut)">รายการ</div></div></div>
    <div style="flex:1;font-size:12px">${pieLeg('ปกติ',s.ok,'var(--ok)',its.length)}${pieLeg('ใกล้หมดอายุ',s.near,'var(--near)',its.length)}${pieLeg('ต่ำกว่าเกณฑ์',s.below,'var(--below)',its.length)}${pieLeg('หมด/หมดอายุ',s.expired+s.out,'var(--bad)',its.length)}${s.pending?pieLeg('ยังไม่ตรวจ',s.pending,'var(--pend)',its.length):''}</div></div></div>`;
  h+=`<div class="sec-h">แนวโน้ม 6 เดือน</div><div class="card"><div class="canvas-wrap"><canvas id="trend"></canvas></div></div>`;
  h+=`<div class="sec-h">อันดับศูนย์จัดการสต็อก</div><div class="card">${rankHTML()}</div>`;
  if(acts.length){h+=`<div class="sec-h">รายการต้องดำเนินการ (${acts.length})</div>`;acts.forEach(a=>{const sm=SM[a.stk];h+=`<div class="irow" style="cursor:default"><div><div style="font-size:14px;font-weight:700">${a.it.name}</div><div style="font-size:12px;color:var(--hint);margin-top:2px">มี ${a.total} ${a.it.unit} · ขั้นต่ำ ${a.it.min}${a.ne?' · หมด '+xL(a.ne):''}</div></div><span class="chip ${sm.c}">${sm.l}</span></div>`;});}
  h+=`<div class="sec-h noprint">ออกรายงาน</div><div class="s2 noprint"><button class="btn prim" onclick="dPr(false)">PDF สรุป 1 หน้า</button><button class="btn sec" onclick="dPr(true)">PDF รายละเอียด (สั่งของ)</button></div><button class="btn sec noprint" style="margin-top:10px" onclick="dCsv()">ดาวน์โหลด Excel (CSV)</button>${cred()}`;
  document.getElementById('scr').innerHTML=h;
  window.cMon=cMonFn;window.dPr=d=>bPr(li,s,acts,d,its);window.dCsv=()=>csvX(li,its);
  drawPie(s);drawTrend(tr,f.c);
}
function cMonFn(d){const[y,m]=S.rym.split('-').map(Number);let nm=m+d,ny=y;if(nm>12){nm=1;ny++}if(nm<1){nm=12;ny--}S.rym=ny+'-'+String(nm).padStart(2,'0');rRep()}

      <span>MediTrack · ระบบตรวจนับสต็อกยาและเวชภัณฑ์ MSBRC-2</span>
      <span>${today}</span>
      <span>${DEV.name} · ${DEV.role}</span>
    </div>
  </div>`;

  pr.style.display = 'block';
  const _hidePrt=()=>{pr.style.display='none';window.onafterprint=null;};
  window.onafterprint=_hidePrt;
  window.print();
  setTimeout(_hidePrt, 2000);
}

boot();

</script>
<div id="modalEl" style="display:none"></div>
</body>
